<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oxy">
<meta name="theme-color" content="#0C0C0C">
<title>Oxy</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0C0C0C;
  --s1:     #151515;
  --s2:     #1E1E1E;
  --s3:     #282828;
  --s4:     #333333;
  --line:   rgba(255,255,255,0.06);
  --line2:  rgba(255,255,255,0.10);
  --text:   #F2F2F2;
  --sub:    #888888;
  --dim:    #505050;
  --stone:  #C8B89A;
  --green:  #4CAF82;
  --red:    #C0503E;
  --font:   'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

#root { height: 100%; }

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}

/* ── APP ── */
.app { display: flex; height: 100%; }

/* ── SIDEBAR ── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--s1);
  border-right: 1px solid var(--line);
}

@media (max-width: 768px) { .sidebar { display: none; } }

.logo {
  padding: 26px 20px 20px;
  border-bottom: 1px solid var(--line);
}

.logo-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}

.logo-sub {
  margin-top: 8px;
  font-size: 11px;
  font-weight: 400;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0;
  text-transform: none;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(76,175,130,0.5);
}

.nav {
  flex: 1;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 10px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 400;
  color: var(--dim);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  width: 100%;
  text-align: left;
  transition: color 0.13s;
  position: relative;
}

.nav-item:hover { color: var(--sub); }

.nav-item.active {
  color: var(--text);
  font-weight: 500;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 25%;
  height: 50%;
  width: 2px;
  border-radius: 2px;
  background: var(--stone);
}

.nav-icon {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  opacity: 0.4;
  transition: opacity 0.13s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-icon svg { width: 15px; height: 15px; }

.nav-item:hover  .nav-icon { opacity: 0.65; }
.nav-item.active .nav-icon { opacity: 1; }

.sidebar-bottom {
  padding: 16px 20px;
  border-top: 1px solid var(--line);
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
}

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

@media (max-width: 768px) { .main { padding-bottom: 64px; } }

/* ── TOPBAR ── */
.topbar {
  height: 50px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 32px;
  border-bottom: 1px solid var(--line);
  gap: 8px;
  background: var(--bg);
  z-index: 10;
}

@media (max-width: 768px) { .topbar { padding: 0 20px; } }

.topbar-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.1px;
}

.topbar-badge {
  font-size: 11.5px;
  color: var(--sub);
  font-weight: 400;
  margin-left: 6px;
}

.topbar-badge::before { content: '· '; }

/* ── CHAT ── */
.chat-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 30px 64px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scrollbar-width: none;
}

.messages::-webkit-scrollbar { display: none; }

@media (max-width: 768px) {
  .messages { padding: 22px 20px 16px; }
}

.message { display: flex; flex-direction: column; }
.message.user { align-items: flex-end; }
.message.oxcy { align-items: flex-start; max-width: 540px; }
.message.visual-message { max-width: 560px; }

/* Oxy speaks — no bubble, pure type */
.message.oxcy .msg-bubble {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text);
  letter-spacing: -0.1px;
  background: none;
  border: none;
  padding: 0;
  box-shadow: none;
  border-radius: 0;
}

/* User message — quiet container */
.message.user .msg-bubble {
  max-width: 440px;
  background: var(--s2);
  border: 1px solid var(--line2);
  border-radius: 18px;
  border-bottom-right-radius: 5px;
  padding: 12px 17px;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: -0.1px;
  box-shadow: none;
}

.msg-time {
  font-size: 10.5px;
  color: var(--dim);
  margin-top: 7px;
  font-weight: 400;
  padding: 0;
}

/* Audio play button */
.msg-play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--s3);
  border: 1px solid var(--line2);
  color: var(--sub);
  cursor: pointer;
  margin-left: 10px;
  font-size: 9px;
  transition: background 0.13s, color 0.13s;
  vertical-align: middle;
}
.msg-play-btn:hover { background: var(--s4); color: var(--text); }

.msg-image-wrap {
  margin-top: 10px;
  max-width: 460px;
  border-radius: 22px;
  overflow: hidden;
  border: none;
  background: transparent;
  box-shadow: 0 18px 44px rgba(0,0,0,0.18);
}

.msg-image {
  display: block;
  width: 100%;
  height: auto;
}

.artifact-card {
  margin-top: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  border-radius: 18px;
  overflow: hidden;
}

.artifact-card.visual {
  border: none;
  background: transparent;
}

.artifact-card.analysis,
.artifact-card.deck {
  background: rgba(255,255,255,0.025);
}

.artifact-image {
  display: block;
  width: 100%;
  max-width: 420px;
  height: auto;
}

.artifact-copy {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 2px 2px;
}

.artifact-card.analysis .artifact-copy,
.artifact-card.deck .artifact-copy {
  padding: 12px 14px 14px;
}

.artifact-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.artifact-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.artifact-sub {
  font-size: 11.5px;
  color: var(--sub);
  line-height: 1.5;
}

.artifact-code {
  margin: 0;
  white-space: pre-wrap;
  font-size: 11px;
  line-height: 1.45;
  color: var(--sub);
  padding: 10px;
  border-radius: 10px;
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.04);
}

.artifact-slide-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.artifact-slide {
  padding: 8px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
}

.artifact-slide-title {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text);
}

.artifact-slide-bullets {
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.45;
  color: var(--sub);
}

/* Action results — quiet lines */
.msg-actions-bar {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}

.msg-action-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 11.5px;
  font-weight: 400;
  padding: 8px 10px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.015);
  border-radius: 12px;
  letter-spacing: 0;
}

.msg-action-status.artifact-only {
  border: none;
  background: transparent;
  padding: 0;
}

.msg-action-copy {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.msg-action-title {
  color: var(--text);
  font-size: 12px;
  line-height: 1.2;
}

.msg-action-sub {
  color: var(--sub);
  font-size: 10.5px;
  line-height: 1.3;
}

.msg-action-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line2);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  text-decoration: none;
  font-size: 11px;
  line-height: 1;
}

.msg-action-link:hover {
  background: rgba(255,255,255,0.08);
}

.msg-action-meta {
  display: inline-block;
  margin-bottom: 6px;
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.msg-action-status.ok  { border-color: rgba(76,175,130,0.18); }
.msg-action-status.fail { border-color: rgba(192,80,62,0.22); }

.msg-action-mark {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  flex-shrink: 0;
  background: var(--stone);
  opacity: 0.8;
}

.msg-action-status.ok .msg-action-mark {
  background: var(--green);
}

.msg-action-status.fail .msg-action-mark {
  background: var(--red);
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}

.typing span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--dim);
  animation: pulse 1.2s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
  40%           { opacity: 1;   transform: scale(1); }
}

/* Date separators */
.date-separator {
  text-align: center;
  margin: 12px 0 4px;
  position: relative;
  flex-shrink: 0;
}
.date-separator span {
  background: var(--bg);
  padding: 0 12px;
  font-size: 11px;
  color: var(--stone);
  position: relative;
  z-index: 1;
  letter-spacing: 0.02em;
}
.date-separator::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: var(--line2);
}

/* Search */
.search-toggle-btn {
  position: absolute;
  top: 14px;
  right: 20px;
  z-index: 10;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.search-toggle-btn:hover { color: var(--text); border-color: var(--line2); background: var(--s3); }
.search-toggle-btn svg { width: 14px; height: 14px; }

.search-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--line2);
  padding: 12px 20px;
}
.search-bar-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.search-input {
  flex: 1;
  background: var(--s3);
  border: 1px solid var(--line2);
  border-radius: 8px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-input:focus { border-color: var(--stone); }
.date-input {
  background: var(--s3);
  border: 1px solid var(--line2);
  border-radius: 8px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  color-scheme: dark;
}
.date-input:focus { border-color: var(--stone); }
.search-close-btn {
  background: transparent;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
}
.search-close-btn:hover { color: var(--text); }
.search-results {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 220px;
  overflow-y: auto;
}
.search-result {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.search-result:hover { background: var(--s3); }
.sr-role { font-size: 10px; color: var(--stone); flex-shrink: 0; font-weight: 500; }
.sr-content { font-size: 12.5px; color: var(--sub); flex: 1; }
.sr-time { font-size: 10px; color: var(--dim); flex-shrink: 0; }

/* History banner */
.history-banner {
  background: var(--s3);
  border-bottom: 1px solid var(--line2);
  padding: 8px 20px;
  font-size: 12px;
  color: var(--sub);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.history-back-btn {
  background: transparent;
  border: none;
  color: var(--stone);
  font-size: 12px;
  cursor: pointer;
  padding: 0;
}
.history-back-btn:hover { opacity: 0.8; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.empty-orb {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--line2);
  background: var(--s1);
}

.empty-text {
  font-size: 13px;
  color: var(--dim);
  font-weight: 400;
}

.prompt-chips {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  max-width: 360px;
  width: 100%;
  margin-top: 6px;
}

.prompt-chip {
  background: var(--s1);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 13px 15px;
  cursor: pointer;
  text-align: left;
  font-family: var(--font);
  transition: border-color 0.13s, background 0.13s;
  line-height: 1.4;
}

.prompt-chip:hover { border-color: var(--line2); background: var(--s2); }
.prompt-chip-icon  { font-size: 15px; margin-bottom: 6px; display: block; }
.prompt-chip-label { font-size: 12.5px; color: var(--text); display: block; font-weight: 500; }
.prompt-chip-sub   { font-size: 11px; color: var(--dim); display: block; margin-top: 2px; }

.new-chat-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  transition: color 0.13s, border-color 0.13s;
  white-space: nowrap;
}
.new-chat-btn:hover { color: var(--text); border-color: rgba(200,184,154,0.3); }

/* Speaking bar */
.speaking-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 64px;
  border-top: 1px solid var(--line);
  font-size: 11.5px;
  color: var(--sub);
  font-weight: 400;
  flex-shrink: 0;
}

@media (max-width: 768px) { .speaking-bar { padding: 9px 20px; } }

.live-status-bar {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 64px 2px;
  font-size: 11px;
  color: var(--sub);
  flex-shrink: 0;
}

@media (max-width: 768px) { .live-status-bar { padding: 6px 16px 2px; } }

.live-status-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--stone);
  opacity: 0.75;
}

.live-status-dot.thinking { animation: pulseDot 1.1s ease-in-out infinite; }
.live-status-dot.working  { background: var(--text); }
.live-status-dot.done     { background: #7a8f72; }
.live-status-dot.speaking { background: #b59d73; animation: pulseDot 0.8s ease-in-out infinite; }

@keyframes pulseDot {
  0%, 100% { transform: scale(0.85); opacity: 0.45; }
  50% { transform: scale(1); opacity: 1; }
}

.speaking-waves {
  display: flex;
  gap: 2px;
  align-items: center;
}

.speaking-waves span {
  width: 2px;
  border-radius: 2px;
  background: var(--stone);
  animation: wave 0.8s ease-in-out infinite;
}

.speaking-waves span:nth-child(1) { height: 7px;  animation-delay: 0s; }
.speaking-waves span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.speaking-waves span:nth-child(3) { height: 9px;  animation-delay: 0.2s; }
.speaking-waves span:nth-child(4) { height: 14px; animation-delay: 0.15s; }
.speaking-waves span:nth-child(5) { height: 7px;  animation-delay: 0.05s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
  50%       { transform: scaleY(1);   opacity: 1; }
}

.stop-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.13s, border-color 0.13s;
}
.stop-btn:hover { color: var(--text); border-color: var(--line2); }

/* ── INPUT ── */
.chat-input-area {
  flex-shrink: 0;
  padding: 8px 64px 12px;
  background: var(--bg);
}

@media (max-width: 768px) { .chat-input-area { padding: 8px 12px 10px; } }

.composer-stack {
  position: relative;
}

.attachment-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 0 0 8px;
}

.attachment-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 999px;
  background: var(--s1);
  border: 1px solid var(--line2);
  color: var(--sub);
  font-size: 12px;
}

.attachment-pill strong {
  color: var(--text);
  font-weight: 500;
}

.attachment-clear {
  border: none;
  background: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 13px;
}

.attachment-clear:hover { color: var(--text); }

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--s1);
  border: 1px solid var(--line2);
  border-radius: 18px;
  padding: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}

.input-row:focus-within {
  border-color: rgba(200,184,154,0.28);

function formatMsgTime(date) {
  return (date instanceof Date ? date : new Date(date))
    .toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function formatDateHeader(date) {
  const d = new Date(date instanceof Date ? date : new Date(date));
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const cmp = new Date(d); cmp.setHours(0, 0, 0, 0);
  if (cmp.getTime() === today.getTime()) return 'Today';
  if (cmp.getTime() === yesterday.getTime()) return 'Yesterday';
  return cmp.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function humanizeActionType(type) {
  const map = {
    send_email: 'Send Email',
    get_emails: 'Inbox',
    search_emails: 'Search Email',
    create_calendar_event: 'Create Calendar Event',
    get_calendar_events: 'Calendar',
    send_telegram: 'Send Telegram',
    get_telegram_contacts: 'Telegram Contacts',
    book_uber: 'Book Uber',
    search_trains: 'Train Search',
    send_message: 'Send Message',
    create_reminder: 'Create Reminder',
    play_music: 'Play Music',
    homekit_control: 'Home Control',
    get_directions: 'Directions',
    order_food: 'Order Food',
    check_balance: 'Check Balance',
    place_bet: 'Place Bet',
    create_note: 'Create Note',
    order_uber_eats: 'Uber Eats',
    order_deliveroo: 'Deliveroo',
    search_netflix_title: 'Netflix Search',
    add_to_netflix_list: 'Netflix My List',
    generate_visual: 'Generate Visual',
    create_diagram: 'Create Diagram',
    create_presentation: 'Create Presentation'
  };
  if (!type) return 'Action';
  return map[type] || type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function normalizeHistoryMessage(m) {
  return {
    role: m.role,
    content: m.content || '',
    image: m.image || null,
    actions: Array.isArray(m.actions) ? m.actions : [],
    audio: m.audio || null,
    kind: m.kind || null,
    time: new Date(m.created_at),
    created_at: m.created_at
  };
}

function getActionLink(result = {}) {
  return result.bookingUrl || result.webLink || result.deepLink || null;
}

function getActionLinkLabel(type, result = {}) {
  if (type === 'search_trains' && result.bookingUrl) return 'Open in Trainline';
  if (type === 'book_uber') return 'Open Uber';
  if (type === 'order_uber_eats') return 'Open Uber Eats';
  if (type === 'order_deliveroo') return 'Open Deliveroo';
  if (type === 'search_netflix_title' || type === 'add_to_netflix_list') return 'Open Netflix';
  return 'Open';
}

function AutoRunActions({ actions }) {
  const [ran, setRan] = useState(false);
  const [blocked, setBlocked] = useState(false);

  useEffect(() => {
    if (!actions || actions.length === 0) return;
    actions.forEach((action, i) => {
      setTimeout(() => {
        const shortcutUrl = `shortcuts://run-shortcut?name=Oxy&input=${encodeURIComponent(JSON.stringify(action))}`;
        const link = document.createElement('a');
        link.href = shortcutUrl;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        apiFetch('/action-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: USER_ID, action, status: 'executed' })
        }).catch(() => {});
      }, i * 800);
    });
    setRan(true);
    setTimeout(() => { if (document.hidden) setRan(true); else setBlocked(true); }, 5000);
  }, [actions]);

  if (ran) return null;
  if (blocked) return (
    <div className="action-hint">
      If the shortcut didn't run, open it once from iOS to grant permission.
    </div>
  );
  return null;
}

function ChatPage({ settings, memory, people, initialQuery, proactiveBriefing, onRecordingChange, onProcessingChange }) {
  const [messages, setMessages] = useState([]);
  const [recentActions, setRecentActions] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [currentStatus, setCurrentStatus] = useState(null);
  const [recording, setRecording] = useState(false);
  const [composerMenuOpen, setComposerMenuOpen] = useState(false);
  const [composerMode, setComposerMode] = useState('chat');
  const [selectedImage, setSelectedImage] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [viewingDate, setViewingDate] = useState(null);
  const [historyLoaded, setHistoryLoaded] = useState(false);
  const setRecordingWithCb = v => { setRecording(v); onRecordingChange?.(v); };
  const setLoadingWithCb   = v => { setLoading(v);   onProcessingChange?.(v); };
  const messagesEndRef    = useRef(null);
  const textareaRef       = useRef(null);
  const audioRef          = useRef(null);
  const mediaRecorderRef  = useRef(null);
  const chunksRef         = useRef([]);
  const messageRefs       = useRef({});
  const pendingJumpRef    = useRef(null);
  const imageInputRef     = useRef(null);
  const cameraInputRef    = useRef(null);
  const pendingImageModeRef = useRef('vision');
  const liveSocketRef     = useRef(null);
  const liveAudioContextRef = useRef(null);
  const liveAudioCursorRef = useRef(0);
  const liveAudioDrainTimerRef = useRef(null);
  const liveTurnRef       = useRef(null);
  const liveInputRef      = useRef(null);
  const queuedAudioRef    = useRef([]);
  const queuedAudioPlayingRef = useRef(false);
  const statusClearTimerRef = useRef(null);
  const recordingStopRequestedRef = useRef(false);
  const briefingInjectedRef = useRef(null);

  const updateCurrentStatus = useCallback((status, label) => {
    if (statusClearTimerRef.current) {
      clearTimeout(statusClearTimerRef.current);
      statusClearTimerRef.current = null;
    }
    const tone = status === 'thinking_start'
      ? 'thinking'
      : status === 'action_start'
        ? 'working'
        : status === 'action_complete'
          ? 'done'
          : status === 'speaking_start'
            ? 'speaking'
            : 'thinking';
    setCurrentStatus({ status, tone, label });
    if (status === 'action_complete') {
      statusClearTimerRef.current = setTimeout(() => {
        setCurrentStatus(prev => (prev?.status === 'action_complete' ? null : prev));
        statusClearTimerRef.current = null;
      }, 1400);
    }
  }, []);

  const clearCurrentStatus = useCallback(() => {
    if (statusClearTimerRef.current) {
      clearTimeout(statusClearTimerRef.current);
      statusClearTimerRef.current = null;
    }
    setCurrentStatus(null);
  }, []);

  const loadHistory = useCallback(() => {
    apiFetch('/history/' + USER_ID)
      .then(r => r.json())
      .then(data => {
        if (data.history && data.history.length > 0) {
          setMessages(data.history.map(normalizeHistoryMessage));
        }
      })
      .catch(() => {})
      .finally(() => setHistoryLoaded(true));
  }, []);

  const loadRecentActions = useCallback(() => {
    apiFetch('/action-log/' + USER_ID)
      .then(r => r.json())
      .then(data => { if (data.actions) setRecentActions(data.actions.slice(0, 4)); })
      .catch(() => {});
  }, []);

  useEffect(() => { loadHistory(); loadRecentActions(); }, []);

  useEffect(() => () => {
    if (selectedImage?.previewUrl) URL.revokeObjectURL(selectedImage.previewUrl);
  }, [selectedImage]);

  useEffect(() => () => {
    if (liveAudioDrainTimerRef.current) clearTimeout(liveAudioDrainTimerRef.current);
    if (statusClearTimerRef.current) clearTimeout(statusClearTimerRef.current);
    if (liveInputRef.current?.stop) liveInputRef.current.stop();
    if (liveSocketRef.current && liveSocketRef.current.readyState === WebSocket.OPEN) {
      try {
        liveSocketRef.current.send(JSON.stringify({ type: 'live-stop' }));
      } catch {}
      liveSocketRef.current.close();
    }
    if (liveAudioContextRef.current && liveAudioContextRef.current.state !== 'closed') {
      liveAudioContextRef.current.close().catch(() => {});
    }
  }, []);

  useEffect(() => {
    if (!loading && !speaking && currentStatus?.status === 'speaking_start') {
      clearCurrentStatus();
    }
  }, [loading, speaking, currentStatus, clearCurrentStatus]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  useEffect(() => {
    const target = pendingJumpRef.current;
    if (!target) return;
    const exact = messageRefs.current[target.created_at];
    if (exact) {
      exact.scrollIntoView({ behavior: 'smooth', block: 'center' });
      pendingJumpRef.current = null;
      return;
    }
    const fallback = Object.values(messageRefs.current).find(el => el?.dataset?.msgContent === target.content);
    if (fallback) {
      fallback.scrollIntoView({ behavior: 'smooth', block: 'center' });
      pendingJumpRef.current = null;
    }
  }, [messages]);

  const autoSend = useRef(false);
  useEffect(() => {
    if (initialQuery && !autoSend.current && messages.length === 0) {
      autoSend.current = true;
      sendMessage(initialQuery);
    }
  }, [initialQuery]);

  useEffect(() => {
    const text = proactiveBriefing?.text?.trim();
    if (!historyLoaded || !text || briefingInjectedRef.current === text) return;
    briefingInjectedRef.current = text;
    setMessages(prev => {
      if (prev.some(msg => msg.role === 'assistant' && (msg.content || '').trim() === text)) return prev;
      return [...prev, { role: 'assistant', content: text, time: new Date(), _briefing: true }];
    });
  }, [historyLoaded, proactiveBriefing]);

  const stopSpeaking = () => {
    if (liveInputRef.current?.stop) liveInputRef.current.stop();
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    queuedAudioRef.current = [];
    queuedAudioPlayingRef.current = false;
    if (liveAudioDrainTimerRef.current) {
      clearTimeout(liveAudioDrainTimerRef.current);
      liveAudioDrainTimerRef.current = null;
    }
    if (liveAudioContextRef.current && liveAudioContextRef.current.state !== 'closed') {
      liveAudioContextRef.current.close().catch(() => {});
    }
    liveAudioContextRef.current = null;
    liveAudioCursorRef.current = 0;
    if (liveSocketRef.current && liveSocketRef.current.readyState === WebSocket.OPEN) {
      try {
        liveSocketRef.current.send(JSON.stringify({ type: 'live-stop' }));
      } catch {}
      liveSocketRef.current.close();
    }
    liveSocketRef.current = null;
    liveTurnRef.current = null;
    setSpeaking(false);
  };

  const resetImageDraft = useCallback(() => {
    setComposerMode('chat');
    setSelectedImage(prev => {
      if (prev?.previewUrl) URL.revokeObjectURL(prev.previewUrl);
      return null;
    });
  }, []);

  const pickImageFile = useCallback((file, mode = 'vision') => {
    if (!file) return;
    setSelectedImage(prev => {
      if (prev?.previewUrl) URL.revokeObjectURL(prev.previewUrl);
      return {
        file,
        name: file.name,
        previewUrl: URL.createObjectURL(file)
      };
    });
    setComposerMode(mode);
    setComposerMenuOpen(false);
    requestAnimationFrame(() => textareaRef.current?.focus());
  }, []);

  const onImagePicked = useCallback(e => {
    pickImageFile(e.target.files?.[0] || null, pendingImageModeRef.current || 'vision');
    e.target.value = '';
  }, [pickImageFile]);

  const runSearch = useCallback(async (q) => {
    if (!q.trim()) { setSearchResults([]); return; }
    try {
      const r = await apiFetch(`/history/${USER_ID}/search?q=${encodeURIComponent(q)}`).then(r => r.json());
      setSearchResults(r.results || []);
    } catch {}
  }, []);

  const jumpToDate = useCallback(async (date) => {
    if (!date) return;
    try {
      const r = await apiFetch(`/history/${USER_ID}/date?date=${date}`).then(r => r.json());
      if (r.history?.length) {
        setMessages(r.history.map(normalizeHistoryMessage));
        setViewingDate(date);
        setSearchOpen(false);
        setSearchResults([]);
        setSearchQuery('');
      }
    } catch {}
  }, []);

  const jumpToMessage = useCallback((msg) => {
    pendingJumpRef.current = { created_at: msg.created_at, content: msg.content };
    jumpToDate(msg.created_at.slice(0, 10));
  }, [jumpToDate]);

  const logAudioStage = useCallback((stage, extra = {}) => {
    console.log('[audio][frontend]', stage, extra);
  }, []);

  const ensureRealtimeAudioContext = useCallback(async (sampleRateHint = 24000) => {
    let ctx = liveAudioContextRef.current;
    if (!ctx || ctx.state === 'closed') {
      ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sampleRateHint });
      liveAudioContextRef.current = ctx;
      liveAudioCursorRef.current = ctx.currentTime;
      logAudioStage('context_created', { state: ctx.state, sampleRate: ctx.sampleRate });
    }
    if (ctx.state === 'suspended') {
      logAudioStage('context_resuming', { state: ctx.state });
      await ctx.resume();
      logAudioStage('context_resumed', { state: ctx.state });
    }
    return ctx;
  }, [logAudioStage]);

  const primeAudioPlayback = useCallback(async (source = 'unknown') => {
    try {
      const ctx = await ensureRealtimeAudioContext(24000);
      const sourceNode = ctx.createBufferSource();
      const silence = ctx.createBuffer(1, 1, ctx.sampleRate);
      sourceNode.buffer = silence;
      sourceNode.connect(ctx.destination);
      sourceNode.start();
      logAudioStage('playback_primed', { source, state: ctx.state });
    } catch (err) {
      console.error('[audio][frontend] prime_failed', source, err);
    }
  }, [ensureRealtimeAudioContext, logAudioStage]);

  const scheduleRealtimeSpeakingDrain = useCallback((ctx, endTime) => {
    if (liveAudioDrainTimerRef.current) clearTimeout(liveAudioDrainTimerRef.current);
    const waitMs = Math.max(0, (endTime - ctx.currentTime) * 1000) + 120;
    liveAudioDrainTimerRef.current = setTimeout(() => {
      if (!audioRef.current) setSpeaking(false);
    }, waitMs);
  }, []);

  const playBase64AudioWithContext = useCallback(async (base64Audio, label = 'tts') => {
    const bytes = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
    logAudioStage('decode_start', { label, bytes: bytes.byteLength, format: 'audio/wav' });
    const ctx = await ensureRealtimeAudioContext(24000);
    const arrayBuffer = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
    const buffer = await ctx.decodeAudioData(arrayBuffer);
    logAudioStage('decode_success', { label, duration: buffer.duration, sampleRate: buffer.sampleRate });
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    const startAt = Math.max(ctx.currentTime + 0.02, liveAudioCursorRef.current || ctx.currentTime);
    const endAt = startAt + buffer.duration;
    liveAudioCursorRef.current = endAt;
    setSpeaking(true);
    logAudioStage('playback_scheduled', { label, startAt, endAt, currentTime: ctx.currentTime });
    source.start(startAt);
    await new Promise(resolve => {
      source.onended = () => {
        logAudioStage('playback_complete', { label, endAt });
        scheduleRealtimeSpeakingDrain(ctx, endAt);
        resolve();
      };
    });
  }, [ensureRealtimeAudioContext, logAudioStage, scheduleRealtimeSpeakingDrain]);

  const playBase64AudioWithElement = useCallback(async (base64Audio, label = 'tts') => {
    const bytes = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' }));
    const audio = new Audio(url);
    audio.preload = 'auto';
    audio.playsInline = true;
    audioRef.current = audio;
    setSpeaking(true);
    logAudioStage('html_audio_play_attempt', { label, bytes: bytes.byteLength });
    try {
      await audio.play();
      logAudioStage('html_audio_play_started', { label });
      await new Promise((resolve, reject) => {
        audio.onended = resolve;
        audio.onerror = () => reject(new Error('Audio element playback failed.'));
      });
      logAudioStage('html_audio_play_complete', { label });
    } finally {
      if (audioRef.current === audio) audioRef.current = null;
      URL.revokeObjectURL(url);
    }
  }, [logAudioStage]);

  const playAudioFromBase64 = useCallback(async (base64Audio, label = 'single') => {
    if (!base64Audio) return;
    logAudioStage('audio_received', { label, bytes: base64Audio.length });
    try {
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current = null;
      }
      await playBase64AudioWithContext(base64Audio, label);
    } catch (err) {
      console.error('[audio][frontend] context_play_failed', label, err);
      try {
        await playBase64AudioWithElement(base64Audio, label);
      } catch (fallbackErr) {
        console.error('[audio][frontend] element_play_failed', label, fallbackErr);
        setSpeaking(false);
      }
    }
  }, [logAudioStage, playBase64AudioWithContext, playBase64AudioWithElement]);

  const playQueuedAudioFromBase64 = useCallback(async () => {
    if (queuedAudioPlayingRef.current) return;
    queuedAudioPlayingRef.current = true;
    try {
      while (queuedAudioRef.current.length) {
        const nextAudio = queuedAudioRef.current.shift();
        if (!nextAudio) continue;
        await playAudioFromBase64(nextAudio.data, nextAudio.label);
      }
    } finally {
      queuedAudioPlayingRef.current = false;
      if (!queuedAudioRef.current.length) setSpeaking(false);
    }
  }, [playAudioFromBase64]);

  const enqueueAudioFromBase64 = useCallback((base64Audio, label = 'stream') => {
    if (!base64Audio) return;
    logAudioStage('audio_event_received', { label, bytes: base64Audio.length });
    queuedAudioRef.current.push({ data: base64Audio, label });
    playQueuedAudioFromBase64();
  }, [logAudioStage, playQueuedAudioFromBase64]);

  const playRealtimeAudioChunk = useCallback(async (base64Audio, mimeType = 'audio/pcm;rate=24000') => {
    if (!base64Audio) return;
    const normalizedType = String(mimeType || '').toLowerCase();
    if (!/audio\/(pcm|l16)/.test(normalizedType)) {
      logAudioStage('realtime_chunk_fallback_to_wav', { mimeType: normalizedType });
      await playAudioFromBase64(base64Audio, 'realtime-wav');
      return;
    }

    const rateMatch = normalizedType.match(/(?:rate|sample_rate)=([0-9]+)/);
    const sampleRate = rateMatch ? Number(rateMatch[1]) : 24000;
    const ctx = await ensureRealtimeAudioContext(sampleRate);
    const bytes = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
    const sampleCount = Math.floor(bytes.byteLength / 2);
    if (!sampleCount) return;
    logAudioStage('realtime_chunk_received', { mimeType: normalizedType, bytes: bytes.byteLength, sampleRate, sampleCount });

    const buffer = ctx.createBuffer(1, sampleCount, sampleRate);
    const channel = buffer.getChannelData(0);
    const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
    for (let i = 0; i < sampleCount; i += 1) {
      channel[i] = view.getInt16(i * 2, true) / 32768;
    }

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    const startAt = Math.max(ctx.currentTime + 0.02, liveAudioCursorRef.current || ctx.currentTime);
    source.start(startAt);
    const endAt = startAt + buffer.duration;
    liveAudioCursorRef.current = endAt;
    setSpeaking(true);
    logAudioStage('realtime_chunk_scheduled', { startAt, endAt, duration: buffer.duration });
    source.onended = () => scheduleRealtimeSpeakingDrain(ctx, endAt);
  }, [ensureRealtimeAudioContext, logAudioStage, playAudioFromBase64, scheduleRealtimeSpeakingDrain]);

  const upsertLiveMessage = useCallback((slot, updater) => {
    const liveTurn = liveTurnRef.current;
    const targetId = liveTurn?.[slot];
    if (!targetId) return;
    setMessages(prev => prev.map(msg => {
      if (msg._liveId !== targetId) return msg;
      return typeof updater === 'function' ? updater(msg) : { ...msg, ...updater };
    }));
  }, []);

  const beginLiveTurn = useCallback(() => {
    const base = Date.now();
    const liveTurn = {
      userId: `${base}-user`,
      assistantId: `${base}-assistant`
    };
    liveTurnRef.current = liveTurn;
    setMessages(prev => [
      ...prev,
      { role: 'user', content: '', time: new Date(), _liveId: liveTurn.userId, _livePending: true },
      { role: 'assistant', content: '', time: new Date(), _liveId: liveTurn.assistantId, _livePending: true, actions: [] }
    ]);
    return liveTurn;
  }, []);

  const finalizeLiveTurn = useCallback(() => {
    const liveTurn = liveTurnRef.current;
    if (!liveTurn) return;
    setMessages(prev => prev
      .map(msg => {
        if (msg._liveId !== liveTurn.userId && msg._liveId !== liveTurn.assistantId) return msg;
        const next = { ...msg };
        delete next._livePending;
        return next;
      })
      .filter(msg => !(msg._liveId && !msg.content && !msg.actions?.length))
    );
    liveTurnRef.current = null;
    setLoadingWithCb(false);
  }, []);

  const openRealtimeVoiceSession = useCallback(async (stream) => {
    const socket = new WebSocket(getRealtimeVoiceSocketUrl());

    await new Promise((resolve, reject) => {
      socket.onopen = resolve;
      socket.onerror = () => reject(new Error('Realtime voice connection failed.'));
    });

    const inputContext = new (window.AudioContext || window.webkitAudioContext)();
    const inputSource = inputContext.createMediaStreamSource(stream);
    const processor = inputContext.createScriptProcessor(4096, 1, 1);
    const silentGain = inputContext.createGain();
    silentGain.gain.value = 0;
    inputSource.connect(processor);
    processor.connect(silentGain);
    silentGain.connect(inputContext.destination);

    const liveTurn = beginLiveTurn();
    const liveCapture = {
      state: 'recording',
      stop: () => {
        if (liveCapture.state !== 'recording') return;
        liveCapture.state = 'inactive';
        try { processor.disconnect(); } catch {}
        try { inputSource.disconnect(); } catch {}
        try { silentGain.disconnect(); } catch {}
        inputContext.close().catch(() => {});
        stream.getTracks().forEach(t => t.stop());
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: 'audio-end' }));
        }
        setLoadingWithCb(true);
      }
    };

    processor.onaudioprocess = event => {
      if (socket.readyState !== WebSocket.OPEN || liveCapture.state !== 'recording') return;
      const input = event.inputBuffer.getChannelData(0);
      const pcm = new Int16Array(input.length);
      for (let i = 0; i < input.length; i += 1) {
        const sample = Math.max(-1, Math.min(1, input[i]));
        pcm[i] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      }
      const bytes = new Uint8Array(pcm.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i += 1) binary += String.fromCharCode(bytes[i]);
      socket.send(JSON.stringify({
        type: 'audio-chunk',
        mimeType: `audio/l16;rate=${inputContext.sampleRate}`,
        data: btoa(binary)
      }));
    };

    liveSocketRef.current = socket;
    mediaRecorderRef.current = liveCapture;
    liveInputRef.current = liveCapture;
    socket.send(JSON.stringify({ type: 'auth', token: AUTH_TOKEN }));
    socket.send(JSON.stringify({ type: 'live-start', voice: settings.voice }));

    socket.onmessage = async (event) => {
      try {
        const payload = JSON.parse(event.data);
        if (payload.type === 'user-transcript') {
          upsertLiveMessage('userId', msg => ({ ...msg, content: payload.text || '', _livePending: !payload.final }));
        }
        if (payload.type === 'assistant-transcript') {
          upsertLiveMessage('assistantId', msg => ({ ...msg, content: payload.text || '', _livePending: !payload.final }));
        }
        if (payload.type === 'assistant-actions' && payload.results?.length) {
          upsertLiveMessage('assistantId', msg => ({
            ...msg,
            actions: [...(msg.actions || []), ...payload.results]
          }));
          maybeOpenActionResults(payload.results);
        }
        if (payload.type === 'assistant-audio') {
          await playRealtimeAudioChunk(payload.data, payload.mimeType);
        }
        if (payload.type === 'live-error') {
          upsertLiveMessage('assistantId', msg => ({
            ...msg,
            content: msg.content || `[Voice unavailable: ${payload.error || 'Realtime voice failed.'}]`
          }));
          finalizeLiveTurn();
        }
        if (payload.type === 'live-turn-complete') {
          finalizeLiveTurn();
          if (socket.readyState === WebSocket.OPEN) socket.close();
        }
      } catch (err) {
        console.error('Realtime voice message error:', err);
      }
    };

    socket.onclose = () => {
      if (liveCapture.state === 'recording') liveCapture.stop();
      if (liveSocketRef.current === socket) liveSocketRef.current = null;
      if (mediaRecorderRef.current === liveCapture) mediaRecorderRef.current = null;
      if (liveInputRef.current === liveCapture) liveInputRef.current = null;
      finalizeLiveTurn();
    };
    setRecordingWithCb(true);
    return { liveTurn, liveCapture };
  }, [beginLiveTurn, finalizeLiveTurn, maybeOpenActionResults, playRealtimeAudioChunk, settings.voice, upsertLiveMessage]);

  const openActionLink = useCallback((deepLink, webLink) => {
    const primary = deepLink || webLink;
    if (!primary) return;
    if (!deepLink || deepLink === webLink) {
      window.open(primary, '_blank', 'noopener');
      return;
    }

    let settled = false;
    const fallbackTimer = setTimeout(() => {
      if (!settled && webLink) {
        settled = true;
        window.open(webLink, '_blank', 'noopener');
      }
    }, 1200);

    const handleVisibility = () => {
      if (document.hidden) {
        settled = true;
        clearTimeout(fallbackTimer);
        document.removeEventListener('visibilitychange', handleVisibility);
      }
    };

    document.addEventListener('visibilitychange', handleVisibility);
    window.location.href = deepLink;
    setTimeout(() => {
      document.removeEventListener('visibilitychange', handleVisibility);
      clearTimeout(fallbackTimer);
    }, 3500);
  }, []);

  const maybeOpenActionResults = useCallback((results = []) => {
    results.forEach(entry => {
      const type = entry?.action || entry?.type;
      if (!AUTO_OPEN_ACTIONS.has(type)) return;
      const deepLink = entry?.result?.deepLink;
      const webLink = entry?.result?.webLink;
      if (deepLink || webLink) openActionLink(deepLink, webLink);
    });
  }, [openActionLink]);

  const startRecording = async () => {
    try {
      recordingStopRequestedRef.current = false;
      stopSpeaking();
      const stream        = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunksRef.current = [];
      if (window.WebSocket) {
        try {
          await openRealtimeVoiceSession(stream);
          if (recordingStopRequestedRef.current && liveInputRef.current?.stop) {
            liveInputRef.current.stop();
            setRecordingWithCb(false);
            recordingStopRequestedRef.current = false;
          }
          return;
        } catch (realtimeErr) {
          console.warn('Realtime voice unavailable, falling back to upload flow:', realtimeErr);
        }
      }

      const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorderRef.current = mediaRecorder;
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mediaRecorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); await sendAudio(); };
      mediaRecorder.start();
      setRecordingWithCb(true);
      if (recordingStopRequestedRef.current) {
        mediaRecorder.stop();
        setRecordingWithCb(false);
        recordingStopRequestedRef.current = false;
      }
    } catch (err) { console.error('Mic error:', err); }
  };

  const stopRecording = () => {
    recordingStopRequestedRef.current = true;
    if (liveInputRef.current?.stop) {
      liveInputRef.current.stop();
      setRecordingWithCb(false);
      recordingStopRequestedRef.current = false;
      return;
    }
    if (mediaRecorderRef.current?.state === 'recording') {
      mediaRecorderRef.current.stop();
      setRecordingWithCb(false);
      recordingStopRequestedRef.current = false;
    }
  };

  const webmToWav = async (webmBlob) => {
    const ctx    = new (window.AudioContext || window.webkitAudioContext)();
    const buf    = await ctx.decodeAudioData(await webmBlob.arrayBuffer());
    const len    = buf.length;
    const sr     = buf.sampleRate;
    const wavBuf = new ArrayBuffer(44 + len * 2);
    const view   = new DataView(wavBuf);
    const ws     = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); view.setUint32(4,36+len*2,true); ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
    view.setUint32(24,sr,true); view.setUint32(28,sr*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
    ws(36,'data'); view.setUint32(40,len*2,true);
    const ch = buf.getChannelData(0);
    let offset = 44;
    for (let i = 0; i < len; i++) {
      const s = Math.max(-1, Math.min(1, ch[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return new Blob([wavBuf], { type: 'audio/wav' });
  };

  const sendAudio = async () => {
    setLoadingWithCb(true);
    const placeholderId = Date.now();
    try {
      await primeAudioPlayback('voice-upload');
      const wavBlob  = await webmToWav(new Blob(chunksRef.current, { type: 'audio/webm' }));
      const formData = new FormData();
      formData.append('audio', wavBlob, 'audio.wav');
      formData.append('userId', USER_ID);
      formData.append('voice', settings.voice);
      const response = await apiFetch('/process-audio', { method: 'POST', body: formData });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let ttsError = '';
      let pendingAssistant = null;
      let pendingAssistantShown = false;
      const revealPendingAssistant = () => {
        if (!pendingAssistant || pendingAssistantShown) return;
        pendingAssistantShown = true;
        setMessages(prev => [...prev, pendingAssistant]);
        pendingAssistant = null;
      };
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split('\n\n');
        buf = events.pop();
        for (const event of events) {
          const line = event.split('\n').find(l => l.startsWith('data: '));
          if (!line) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'transcription') {
              setMessages(prev => [...prev, { role: 'user', content: ev.text, time: new Date(), _id: placeholderId }]);
            }
            if (ev.type === 'transcription-error') {
              setMessages(prev => [...prev, { role: 'assistant', content: ev.error || "I couldn't clearly make out what you said.", time: new Date() }]);
            }
            if (ev.type === 'response') {
              const m = { role: 'assistant', content: ev.text, time: new Date() };
              if (ev.actions?.length) m.actions = ev.actions;
              pendingAssistant = m;
              if (ev.actions?.length) maybeOpenActionResults(ev.actions);
              revealPendingAssistant();
            }
            if (ev.type === 'audio') {
              console.log('[audio][frontend] process-audio SSE received', { mimeType: ev.mimeType || 'audio/wav', bytes: ev.data?.length || 0 });
              enqueueAudioFromBase64(ev.data, 'process-audio');
              revealPendingAssistant();
            }
            if (ev.type === 'tts-error') {
              ttsError = ev.error || 'Voice unavailable.';
              console.error('TTS error:', ttsError);
              revealPendingAssistant();
            }
            if (ev.type === 'error') {
              console.error('Audio processing error:', ev.error);
            }
          } catch {}
        }
      }
      revealPendingAssistant();
      if (ttsError) {
        setMessages(prev => [...prev, { role: 'assistant', content: `[Voice unavailable: ${ttsError}]`, time: new Date() }]);
      }
    } catch (err) { console.error('Audio error:', err); }
    setLoadingWithCb(false);
  };

  const sendImageRequest = useCallback(async (overrideText) => {
    const prompt = (overrideText || input).trim();
    if (!prompt || loading) return;
    const userMessage = selectedImage ? `${prompt}\n\n[Image reference attached: ${selectedImage.name}]` : prompt;
    setMessages(prev => [...prev, { role: 'user', content: userMessage, time: new Date() }]);
    if (!overrideText) setInput('');
    setLoadingWithCb(true);
    stopSpeaking();
    setComposerMenuOpen(false);
    if (textareaRef.current) textareaRef.current.style.height = 'auto';

    const placeholderId = Date.now();
    setMessages(prev => [...prev, { role: 'assistant', content: selectedImage ? 'Editing image…' : 'Generating image…', time: new Date(), _streamId: placeholderId }]);

    try {
      const formData = new FormData();
      formData.append('userId', USER_ID);
      formData.append('prompt', prompt);
      if (selectedImage?.file) formData.append('image', selectedImage.file);

      const resp = await apiFetch('/images/generate', { method: 'POST', body: formData });
      const data = await resp.json();
      if (!resp.ok || !data.image) {
        throw new Error(data.error || 'Image generation failed.');
      }

      const generatedImage = `data:${data.mimeType || 'image/png'};base64,${data.image}`;
      setMessages(prev => prev.map(m =>
        m._streamId === placeholderId
          ? { role: 'assistant', content: '', image: generatedImage, kind: 'image', time: m.time }
          : m
      ));
      resetImageDraft();
    } catch (err) {
      setMessages(prev => prev.map(m =>
        m._streamId === placeholderId
          ? { role: 'assistant', content: err.message || 'Image generation failed.', time: m.time }
          : m
      ));
    } finally {
      setLoadingWithCb(false);
    }
  }, [input, loading, selectedImage, resetImageDraft]);

  const sendVisionMessage = useCallback(async (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading || !selectedImage?.file) return;
    setMessages(prev => [...prev, { role: 'user', content: `${text}\n\n[Attached image: ${selectedImage.name}]`, time: new Date() }]);
    if (!overrideText) setInput('');
    setLoadingWithCb(true);
    stopSpeaking();
    setComposerMenuOpen(false);
    if (textareaRef.current) textareaRef.current.style.height = 'auto';

    const placeholderId = Date.now();
    setMessages(prev => [...prev, { role: 'assistant', content: 'Looking through the image…', time: new Date(), _streamId: placeholderId }]);

    try {
      await primeAudioPlayback('vision-message');
      const params = new URLSearchParams();
      if (settings.voiceOn) params.set('tts', 'true');
      const formData = new FormData();
      formData.append('userId', USER_ID);
      formData.append('message', text);
      formData.append('settings', JSON.stringify(settings));
      formData.append('image', selectedImage.file);

      const resp = await apiFetch(`/chat-with-image${params.toString() ? `?${params}` : ''}`, { method: 'POST', body: formData });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Image analysis failed.');

      let finalText = data.text || 'I looked through it.';
      if (data.ttsError) finalText = `${finalText}\n\n[Voice unavailable: ${data.ttsError}]`.trim();
      setMessages(prev => prev.map(m =>
        m._streamId === placeholderId
          ? { role: 'assistant', content: finalText, actions: data.actions || [], time: m.time }
          : m
      ));
      if (data.actions?.length) maybeOpenActionResults(data.actions);
      if (data.audio) {
        console.log('[audio][frontend] chat-with-image JSON received', { mimeType: data.audioMimeType || 'audio/wav', bytes: data.audio.length });
        enqueueAudioFromBase64(data.audio, 'chat-with-image');
      }
      resetImageDraft();
    } catch (err) {
      setMessages(prev => prev.map(m =>
        m._streamId === placeholderId
          ? { role: 'assistant', content: err.message || 'Image analysis failed.', time: m.time }
          : m
      ));
    } finally {
      setLoadingWithCb(false);
    }
  }, [input, loading, selectedImage, settings, resetImageDraft, maybeOpenActionResults, enqueueAudioFromBase64, primeAudioPlayback]);

  const sendMessage = useCallback(async (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading) return;
    clearCurrentStatus();
    setMessages(prev => [...prev, { role: 'user', content: text, time: new Date() }]);
    if (!overrideText) setInput('');
    setLoadingWithCb(true);
    stopSpeaking();
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    try {
      await primeAudioPlayback('chat-message');
      const params = new URLSearchParams({ stream: 'true' });
      if (settings.voiceOn) params.set('tts', 'true');
      const resp = await apiFetch(`/chat?${params}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, userId: USER_ID, settings, memory, people })
      });

      // Add a placeholder assistant message that we'll update as tokens stream in
      const placeholderId = Date.now();
      setMessages(prev => [...prev, { role: 'assistant', content: '', time: new Date(), _streamId: placeholderId }]);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let streamedText = '';
      let streamActions = null;
      let ttsError = '';
      const publishStreamedText = () => {
        setMessages(prev => prev.map(m =>
          m._streamId === placeholderId ? { ...m, content: streamedText } : m
        ));
      };

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'status') {
              updateCurrentStatus(ev.status, ev.label);
            }
            if (ev.type === 'text') {
              streamedText += ev.chunk;
              publishStreamedText();
            }
            if (ev.type === 'replace') {
              streamedText = ev.text || '';
              publishStreamedText();
            }
            if (ev.type === 'actions' && ev.results?.length) {
              streamActions = ev.results;
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId ? { ...m, actions: ev.results } : m
              ));
              maybeOpenActionResults(ev.results);
            }
            if (ev.type === 'audio') {
              console.log('[audio][frontend] chat SSE received', {
                seq: ev.seq,
                chunk: ev.chunk,
                mimeType: ev.mimeType || 'audio/wav',
                bytes: ev.data?.length || 0
              });
              publishStreamedText();
              enqueueAudioFromBase64(ev.data, `chat-stream-${ev.seq ?? 'na'}-${ev.chunk ?? 'na'}`);
            }
            if (ev.type === 'tts-error') {
              ttsError = ev.error || 'Voice unavailable.';
              console.error('TTS error:', ttsError);
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId
                  ? { ...m, content: `${streamedText}\n\n[Voice unavailable: ${ttsError}]`.trim() }
                  : m
              ));
            }
            if (ev.type === 'error') {
              streamedText = ev.error || 'Something went wrong.';
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId ? { ...m, content: streamedText } : m
              ));
            }
          } catch {}
        }
      }

      // Finalize: remove stream marker
      if (!streamedText) streamedText = 'Something went wrong.';
      setMessages(prev => prev.map(m => {
        if (m._streamId !== placeholderId) return m;
        const final = { role: 'assistant', content: ttsError ? `${streamedText}\n\n[Voice unavailable: ${ttsError}]`.trim() : streamedText, time: m.time };
        if (streamActions) final.actions = streamActions;
        return final;
      }));
    } catch (err) {
      clearCurrentStatus();
      setMessages(prev => [...prev, { role: 'assistant', content: 'Connection failed.', time: new Date() }]);
    }
    if (!speaking) clearCurrentStatus();
    setLoadingWithCb(false);
  }, [input, loading, settings, memory, people, maybeOpenActionResults, enqueueAudioFromBase64, clearCurrentStatus, updateCurrentStatus, speaking, primeAudioPlayback]);

  const handleKeyDown = e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (composerMode === 'image') sendImageRequest();
      else if (selectedImage?.file) sendVisionMessage();
      else sendMessage();
    }
  };

  const handleInput = e => {
    setInput(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 140) + 'px';
  };

  const recentContacts = people.slice(0, 3).map(p => p.name);
  const formatActionTitle = (entry) => {
    const raw = entry?.action;
    if (!raw) return 'Action';
    if (typeof raw === 'string') return humanizeActionType(raw);
    return humanizeActionType(raw.type || raw.action || 'Action');
  };
  const formatTrailStatus = (status) => {
    if (!status) return 'Done';
    const normalized = String(status).toLowerCase();
    if (normalized === 'executed' || normalized === 'completed' || normalized === 'success') return 'Done';
    if (normalized === 'pending') return 'Pending';
    if (normalized === 'failed' || normalized === 'error') return 'Failed';
    return normalized.replace(/_/g, ' ');
  };

  const renderArtifact = artifact => {
    if (!artifact) return null;
    if (artifact.type === 'image' || artifact.type === 'diagram' || artifact.type === 'image_analysis') {
      const src = artifact.image ? `data:${artifact.mimeType || 'image/png'};base64,${artifact.image}` : null;
      return (
        <div className={`artifact-card ${artifact.type === 'image_analysis' ? 'analysis' : 'visual'}`}>
          {src && <img className="artifact-image" src={src} alt={artifact.title || 'Artifact'} />}
          <div className="artifact-copy">
            {(artifact.title || artifact.summary) && (
              <div className="artifact-meta">
                <div className="artifact-title">{artifact.title || humanizeActionType(artifact.type)}</div>
                {artifact.summary && <div className="artifact-sub">{artifact.summary}</div>}
              </div>
            )}
            {artifact.mermaid && <pre className="artifact-code">{artifact.mermaid}</pre>}
          </div>
        </div>
      );
    }
    if (artifact.type === 'slide_deck') {
      const src = artifact.image ? `data:${artifact.mimeType || 'image/png'};base64,${artifact.image}` : null;
      return (
        <div className="artifact-card deck">
          {src && <img className="artifact-image" src={src} alt={artifact.title || 'Presentation cover'} />}
          <div className="artifact-copy">
            <div className="artifact-meta">
              <div className="artifact-title">{artifact.title || 'Presentation'}</div>
              {artifact.subtitle && <div className="artifact-sub">{artifact.subtitle}</div>}
            </div>
            <div className="artifact-slide-list">
              {(artifact.slides || []).map((slide, idx) => (
                <div key={idx} className="artifact-slide">
                  <div className="artifact-slide-title">{idx + 1}. {slide.title}</div>
                  <div className="artifact-slide-bullets">{(slide.bullets || []).slice(0, 3).join(' • ')}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    return null;
  };

  return (
    <div className="chat-page">
      <button className="search-toggle-btn" onClick={() => setSearchOpen(o => !o)} title="Search messages">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round">
          <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
        </svg>
      </button>
      {searchOpen && (
        <div className="search-overlay">
          <div className="search-bar-row">
            <input
              className="search-input"
              autoFocus
              placeholder="Search messages…"
              value={searchQuery}
              onChange={e => { setSearchQuery(e.target.value); runSearch(e.target.value); }}
            />
            <input
              type="date"
              className="date-input"
              onChange={e => jumpToDate(e.target.value)}
            />
            <button className="search-close-btn" onClick={() => { setSearchOpen(false); setSearchResults([]); setSearchQuery(''); }}>✕</button>
          </div>
          {searchResults.length > 0 && (
            <div className="search-results">

                  <span className="sr-role">{r.role === 'user' ? 'You' : 'Oxy'}</span>
                  <span className="sr-content">{r.content.length > 90 ? r.content.slice(0, 90) + '…' : r.content}</span>
                  <span className="sr-time">{formatMsgTime(new Date(r.created_at))}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {viewingDate && (
        <div className="history-banner">
          Viewing {new Date(viewingDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}
          <button className="history-back-btn" onClick={() => { setViewingDate(null); loadHistory(); }}>Back to latest →</button>
        </div>
      )}
      <div className="messages">
        {messages.length === 0 && !loading && (
          <div className="empty-state">
            <div className="empty-text">{settings.name}</div>
            <div className="prompt-chips">
              {[
                { icon: '📨', label: `Message ${people[0]?.name || 'a contact'}`, sub: 'Send via iMessage', prompt: `Send a message to ${people[0]?.name || 'someone'}` },
                { icon: '⏰', label: 'Set a reminder',   sub: 'For any time or task', prompt: 'Set a reminder for tomorrow' },
                { icon: '🚕', label: 'Arrange transport',   sub: 'Set the journey in motion', prompt: 'Book me an Uber to the station' },
                { icon: '☀️', label: 'Morning briefing', sub: "What's on today", prompt: 'Give me my morning briefing' },
              ].map((chip, i) => (
                <button key={i} className="prompt-chip" onClick={() => sendMessage(chip.prompt)}>
                  <span className="prompt-chip-icon">{chip.icon}</span>
                  <span className="prompt-chip-label">{chip.label}</span>
                  <span className="prompt-chip-sub">{chip.sub}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((msg, i) => {
          const msgDate = msg.time instanceof Date ? msg.time : new Date(msg.time);
          const prevDate = i > 0 ? (messages[i-1].time instanceof Date ? messages[i-1].time : new Date(messages[i-1].time)) : null;
          const showDateHeader = !prevDate || msgDate.toDateString() !== prevDate.toDateString();
          return (
            <React.Fragment key={i}>
              {showDateHeader && (
                <div className="date-separator"><span>{formatDateHeader(msgDate)}</span></div>
              )}
              <div
                className={`message ${msg.role === 'user' ? 'user' : 'oxcy'} ${!msg.content && (msg.image || msg.actions?.length) ? 'visual-message' : ''}`}
                ref={el => {
                  const key = msg.created_at || `${msg.role}-${msg.time?.getTime?.() || i}-${i}`;
                  if (el) {
                    messageRefs.current[key] = el;
                    el.dataset.msgContent = msg.content || '';
                  } else {
                    delete messageRefs.current[key];
                  }
                }}
              >
                {(msg.content || msg.audio) && (
                  <div className="msg-bubble">
                    {msg.content}
                    {msg.audio && (
                      <button className="msg-play-btn" onClick={() => playAudioFromBase64(msg.audio)} title="Play">▶</button>
                    )}
                  </div>
                )}
                {msg.image && (
                  <div className="msg-image-wrap">
                    <img className="msg-image" src={msg.image} alt="Generated by Oxy" />
                  </div>
                )}
                {msg.actions && msg.actions.length > 0 && (
                  <div className="msg-actions-bar">
                    {msg.actions.map((a, j) => {
                      const ok = a.result?.success !== false;
                      const type = a.action || a.type || 'action';
                      const artifact = a.result?.artifact;
                      const artifactOnly = artifact && VISUAL_ARTIFACT_TYPES.has(artifact.type) && ok;
                      const actionLink = getActionLink(a.result || {});
                      const label = type === 'book_uber' ? `Uber — ${a.result?.text || 'opening app'}`
                                  : type === 'send_email' ? 'Email sent'
                                  : type === 'create_calendar_event' ? 'Event created'
                                  : type === 'get_emails' ? 'Emails fetched'
                                  : type === 'get_calendar_events' ? 'Calendar fetched'
                                  : type === 'send_telegram' ? `Telegram — ${a.result?.text || 'message sent'}`
                                  : type === 'get_telegram_contacts' ? `${a.result?.text || 'Contacts fetched'}`
                                  : type === 'search_trains' ? (a.result?.trains?.length ? 'Train times' : 'Trainline')
                                  : humanizeActionType(type);
                      const detail = a.result?.error || a.result?.text || '';
                      const repeatedDetail = !!(detail && msg.content && msg.content.includes(detail));
                      const compactLabel = type === 'book_uber' ? 'Uber ready'
                                        : type === 'create_calendar_event' ? 'Event added'
                                        : type === 'get_emails' ? 'Emails loaded'
                                        : type === 'get_calendar_events' ? 'Calendar loaded'
                                        : type === 'send_telegram' ? 'Telegram sent'
                                        : type === 'get_telegram_contacts' ? 'Contacts loaded'
                                        : label;
                      const showDetail = !artifactOnly && (!ok || (!repeatedDetail && !msg.content));
                      return (
                        <span key={j} className={`msg-action-status ${ok ? 'ok' : 'fail'} ${artifactOnly ? 'artifact-only' : ''}`}>
                          <span className="msg-action-copy">
                            {!artifactOnly && <span className="msg-action-mark"/>}
                            {!artifactOnly && <span className="msg-action-title">{compactLabel}</span>}
                            {!artifactOnly && detail && showDetail && (
                              <span className="msg-action-sub">
                                {detail}
                              </span>
                            )}
                            {artifactOnly && <span className="msg-action-meta">{label}</span>}
                            {renderArtifact(artifact)}
                            {!artifactOnly && actionLink && (
                              <a
                                className="msg-action-link"
                                href={actionLink}
                                target="_blank"
                                rel="noreferrer"
                              >
                                {getActionLinkLabel(type, a.result || {})}
                              </a>
                            )}
                          </span>
                        </span>
                      );
                    })}
                  </div>
                )}
                <div className="msg-time">{formatMsgTime(msgDate)}</div>
              </div>
            </React.Fragment>
          );
        })}
        {loading && (
          <div className="message oxcy">
            <div className="typing"><span/><span/><span/></div>
          </div>
      )}
        <div ref={messagesEndRef} />
      </div>

      {currentStatus?.label && (
        <div className="live-status-bar">
          <div className={`live-status-dot ${currentStatus.tone}`}/>
          <span>{currentStatus.label}</span>
        </div>
      )}

      {speaking && (
        <div className="speaking-bar">
          <div className="speaking-waves"><span/><span/><span/><span/><span/></div>
          {settings.name} is speaking
          <button className="stop-btn" onClick={stopSpeaking}>Stop</button>
        </div>
      )}

      <div className="chat-input-area">
        <div className="composer-stack">
          <input ref={imageInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={onImagePicked} />
          <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onImagePicked} />

          {(selectedImage || composerMode === 'image') && (
            <div className="attachment-strip">
              <div className="attachment-pill">
                <span>{Icons.image}</span>
                <span>
                  <strong>{selectedImage ? selectedImage.name : 'Generate image'}</strong>
                  {selectedImage ? (composerMode === 'image' ? ' ready to turn into a visual' : ' ready for analysis or workflows') : ' using prompt only'}
                </span>
                <button className="attachment-clear" onClick={resetImageDraft} title="Remove">×</button>
              </div>
            </div>
          )}

          <div className="input-row">
            <div className="composer-plus-wrap">
              <button className={`composer-plus ${composerMenuOpen ? 'open' : ''}`} onClick={() => setComposerMenuOpen(v => !v)} title="Add">
                <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:16,height:16}}>{Icons.plus}</span>
              </button>
              {composerMenuOpen && (
                <div className="composer-menu">
                  <div className="composer-menu-title">Create</div>
                  <button className="composer-menu-item" onClick={() => { setComposerMode('image'); setComposerMenuOpen(false); requestAnimationFrame(() => textareaRef.current?.focus()); }}>
                    <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:16,height:16}}>{Icons.image}</span>
                    <span className="composer-menu-copy">
                      <strong>Generate image</strong>
                      <span>Create a visual inside the workflow</span>
                    </span>
                  </button>
                  <button className="composer-menu-item" onClick={() => { pendingImageModeRef.current = 'vision'; setComposerMode('vision'); setComposerMenuOpen(false); imageInputRef.current?.click(); }}>
                    <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:16,height:16}}>{Icons.paperclip}</span>
                    <span className="composer-menu-copy">
                      <strong>Upload image</strong>
                      <span>Analyze a screenshot or photo</span>
                    </span>
                  </button>
                  <button className="composer-menu-item" onClick={() => { pendingImageModeRef.current = 'vision'; setComposerMode('vision'); setComposerMenuOpen(false); cameraInputRef.current?.click(); }}>
                    <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:16,height:16}}>{Icons.camera}</span>
                    <span className="composer-menu-copy">
                      <strong>Take photo</strong>
                      <span>Use the camera for context</span>

                    : 'Image context mode'}

              <textarea
                ref={textareaRef}
                className="chat-input"
                placeholder={
                  composerMode === 'image'
                    ? `Describe the visual you want ${selectedImage ? 'made from this image' : 'made'}…`
