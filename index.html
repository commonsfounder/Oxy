function TelegramAuthModal({ onSuccess, onClose }) {
  const [step, setStep]   = useState('phone'); // phone | code | twofa
  const [phone, setPhone] = useState('');
  const [code, setCode]   = useState('');
  const [pass, setPass]   = useState('');
  const [busy, setBusy]   = useState(false);
  const [err,  setErr]    = useState('');

  const submitPhone = async () => {
    if (!phone.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, phone: phone.trim() })
      });
      const d = await r.json();
      if (d.success) setStep('code');
      else setErr(d.error || 'Failed to send code');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const submitCode = async () => {
    if (!code.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, code: code.trim() })
      });
      const d = await r.json();
      if (d.success && !d.requires2FA) onSuccess();
      else if (d.success && d.requires2FA) setStep('twofa');
      else setErr(d.error || 'Invalid code');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const submit2FA = async () => {
    if (!pass.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/2fa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, password: pass })
      });
      const d = await r.json();
      if (d.success) onSuccess();
      else setErr(d.error || 'Wrong password');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const stepConfig = {
    phone: { title: 'Connect Telegram', sub: 'Enter your phone number in international format', label: 'Phone number', value: phone, onChange: setPhone, placeholder: '+447...', onSubmit: submitPhone, btnText: 'Send code' },
    code:  { title: 'Enter Code',       sub: 'Check your Telegram app for the verification code', label: 'Verification code', value: code, onChange: setCode, placeholder: '12345', onSubmit: submitCode, btnText: 'Verify' },
    twofa: { title: 'Two-Factor Auth',  sub: 'Enter your Telegram 2FA password', label: 'Password', value: pass, onChange: setPass, placeholder: '••••••••', onSubmit: submit2FA, btnText: 'Confirm', type: 'password' },
  }[step];

  return (
    <div className="auth-overlay" style={{zIndex:500}} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="auth-card">
        <div style={{fontSize:'28px',marginBottom:'12px'}}>✈️</div>
        <h2>{stepConfig.title}</h2>
        <p>{stepConfig.sub}</p>
        <input
          className="auth-input"
          type={stepConfig.type || 'text'}
          placeholder={stepConfig.placeholder}
          value={stepConfig.value}
          onChange={e => stepConfig.onChange(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !busy && stepConfig.onSubmit()}
          autoFocus
        />
        {err && <div style={{color:'var(--red)',fontSize:'12px',marginBottom:'8px'}}>{err}</div>}
        <button className="auth-btn" onClick={stepConfig.onSubmit} disabled={busy}>
          {busy ? 'Please wait…' : stepConfig.btnText}
        </button>
        <button onClick={onClose} style={{marginTop:'14px',background:'none',border:'none',color:'var(--dim)',fontSize:'12px',cursor:'pointer',fontFamily:'var(--font)'}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function ConnectorsPage() {
  const [connectors, setConnectors] = useState([]);
  const [loading, setLoading] = useState(true);
  const [googleStatus, setGoogleStatus] = useState('idle'); // idle | connecting | connected | error
  const [telegramModal, setTelegramModal] = useState(false);

  const loadConnectors = () => {
    apiFetch(`/connectors/${USER_ID}`)
      .then(r => r.json())
      .then(d => {
        const list = d.connectors || [];
        setConnectors(list);
        const g = list.find(c => c.id === 'google');
        if (g?.enabled) setGoogleStatus('connected');
        setLoading(false);
      })
      .catch(() => setLoading(false));
  };

  useEffect(() => {
    loadConnectors();
    const onMsg = (e) => {
      if (e.data === 'google_auth_success') { setGoogleStatus('connected'); loadConnectors(); }
      if (e.data === 'google_auth_error')   { setGoogleStatus('error'); }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const connectGoogle = async () => {
    setGoogleStatus('connecting');
    try {
      const resp = await apiFetch(`/auth/google/start?userId=${encodeURIComponent(USER_ID)}`);
      const data = await resp.json();
      if (!resp.ok || !data.url) throw new Error(data.error || 'Google connect failed.');
      window.open(data.url, 'oxy_auth', 'width=500,height=600');
    } catch {
      setGoogleStatus('error');
    }
  };

  const toggle = async (id, enabled) => {
    if (id === 'telegram' && !enabled) {
      setTelegramModal(true);
      return;
    }
    await apiFetch('/connectors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: USER_ID, connectorId: id, enabled: !enabled })
    });
    setConnectors(prev => prev.map(c => c.id === id ? { ...c, enabled: !c.enabled } : c));
  };

  const onTelegramSuccess = async () => {
    setTelegramModal(false);
    await apiFetch('/connectors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: USER_ID, connectorId: 'telegram', enabled: true })
    });
    loadConnectors();
  };

  if (loading) return (
    <div className="page-content" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
      <span style={{color:'var(--dim)'}}>Loading…</span>
    </div>
  );

  const nonGoogle = connectors.filter(c => c.id !== 'google');
  const grouped = nonGoogle.reduce((acc, c) => {
    acc[c.category] = acc[c.category] || [];
    acc[c.category].push(c);
    return acc;
  }, {});

  const googleBtnLabel = { idle: 'Connect', connecting: 'Connecting…', connected: 'Connected', error: 'Retry' }[googleStatus];
  const googleBtnStyle = googleStatus === 'connected'
    ? { background: 'rgba(52,168,83,0.15)', color: '#34A853', border: '1px solid rgba(52,168,83,0.3)' }
    : {};

  return (
    <div className="page-content">
      {telegramModal && (
        <TelegramAuthModal
          onSuccess={onTelegramSuccess}
          onClose={() => setTelegramModal(false)}
        />
      )}

      <div className="section">
        <div className="section-title">Google</div>
        <div className="hub-card">
          <div className="hub-info">
            <div className="hub-icon-box" style={{background:'linear-gradient(135deg,#4285F4,#34A853)'}}>
              <span style={{fontSize:'18px',fontWeight:700,color:'#fff'}}>G</span>
            </div>
            <div>
              <div className="hub-name">Google</div>
              <div className="hub-desc">Gmail · Calendar{googleStatus === 'connected' ? ' · Connected ✓' : ''}</div>
            </div>
          </div>
          <button className="save-btn" style={googleBtnStyle} onClick={connectGoogle} disabled={googleStatus === 'connecting' || googleStatus === 'connected'}>
            {googleBtnLabel}
          </button>
        </div>
      </div>

      {Object.entries(grouped).map(([cat, items]) => (
        <div key={cat} className="section">
          <div className="section-title">{cat}</div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', gap:'12px'}}>
            {items.map(c => (
              <div key={c.id} className="hub-item" style={!c.implemented ? {opacity:0.4, pointerEvents:'none'} : {}}>
                <div className="connector-icon">{c.icon}</div>
                <div className="connector-name">{c.name}{!c.implemented ? <span style={{display:'block',fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}>coming soon</span> : ''}</div>
                {c.implemented && <div className={`conn-toggle ${c.enabled ? 'on' : ''}`} onClick={() => toggle(c.id, c.enabled)} />}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function ActionHistoryPage() {
  const [actions, setActions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch(`/action-log/${USER_ID}`)
      .then(r => r.json())
      .then(d => { setActions(d.actions || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const formatAction = a => {
    if (!a) return '';
    if (typeof a === 'string') {
      try {
        const p = JSON.parse(a);
        return p.type === 'shortcut' ? p.name : humanizeActionType(p.type || a);
      } catch {
        return humanizeActionType(a);
      }
    }
    if (typeof a === 'object') return a.type === 'shortcut' ? a.name : humanizeActionType(a.type || JSON.stringify(a));
    return String(a);
  };

  if (loading) return (
    <div className="page-content" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
      <span style={{color:'var(--dim)'}}>Loading…</span>
    </div>
  );

  return (
    <div className="page-content">
      <div className="section">
        <div className="section-title">Action History</div>
        {actions.length === 0 ? (
          <div style={{color:'var(--dim)',fontSize:'13px',paddingTop:'8px'}}>No actions yet.</div>
        ) : (
          <div className="history-list">
            {actions.map((a, i) => (
              <div key={i} className="history-item">
                <div className="history-time">{new Date(a.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>
                <div className="history-action">{formatAction(a.action)}</div>
                <span className={`history-status status-${a.status}`}>{a.status}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsPage({ settings, setSettings, onPreviewVoice }) {

    setSettings(prev => {

      <div className="section">
        <div className="section-title">Identity</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Assistant Name</div>
            </div>
            <input className="setting-input" value={settings.name} onChange={e => update('name', e.target.value)} />
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Voice</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Voice Playback</div>
              <div className="setting-desc">Generate audio for responses</div>
            </div>
            <button className={`toggle ${settings.voiceOn ? 'on' : ''}`} onClick={() => update('voiceOn', !settings.voiceOn)} />
          </div>
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Gemini Voice</div>
              <div className="setting-desc">Choose the voice used for spoken replies</div>
            </div>
          </div>
          <div className="voice-option-list">
            {VOICE_OPTIONS.map(voice => (
              <label key={voice.value} className="voice-option">
                <div className="voice-option-main">
                  <input
                    type="radio"
                    name="oxy-voice"
                    checked={settings.voice === voice.value}
                    onChange={() => update('voice', voice.value)}
                  />
                  <span className="voice-option-label">{voice.label}</span>
                </div>
                <button
                  type="button"
                  className="voice-preview-btn"
                  disabled={previewingVoice === voice.value}
                  onClick={(e) => {
                    e.preventDefault();
                    previewVoice(voice.value);
                  }}
                >
                  {previewingVoice === voice.value ? 'Playing…' : 'Play'}
                </button>
              </label>
            ))}
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Autonomy</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Initiative Level</div>
              <div className="setting-desc">How often Oxy proactively reaches out</div>
            </div>
            <div className="autonomy-options">
              {['Low','Medium','High'].map(l => (
                <button key={l} className={`autonomy-opt ${settings.autonomy === l ? 'active' : ''}`} onClick={() => update('autonomy', l)}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">Saved</div>}
    </div>
  );
}

function App() {
  const [isAuth,      setIsAuth]      = useState(!!AUTH_TOKEN && !!USER_ID);
  const [page,        setPage]        = useState('chat');
  const [isRecording, setIsRecording] = useState(false);
  const [isProcessing,setIsProcessing]= useState(false);
  const [memory,      setMemory]      = useState('');
  const [people,      setPeople]      = useState([]);
  const [settings,    setSettings]    = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('oxy_settings') || 'null');
      return saved ? { ...DEFAULT_SETTINGS, ...saved } : DEFAULT_SETTINGS;
    } catch {
      return DEFAULT_SETTINGS;
    }
  });
  const [briefing, setBriefing] = useState(null);
  const [initialQuery, setInitialQuery] = useState(null);
  const [authMode, setAuthMode] = useState('login');
  const [authUserId, setAuthUserId] = useState(USER_ID);
  const [authPassword, setAuthPassword] = useState('');
  const [authError, setAuthError] = useState('');
  const [authBusy, setAuthBusy] = useState(false);

  useEffect(() => {
    if (!isAuth) return;
    let cancelled = false;
    const fetchBriefing = () => apiFetch(`/briefing/${USER_ID}`)
      .then(async r => {
        if (r.status === 401) {
          clearSession();
          setIsAuth(false);
          return {};
        }
        return r.json();
      })
      .then(d => {
        if (!cancelled && d.text) setBriefing({
          text: d.text,
          actions: d.actions || [],
          created_at: d.created_at || null,
          kind: d.kind || 'briefing'
        });
      })
      .catch(() => {});

    fetchBriefing();
    return () => {
      cancelled = true;
    };
  }, [isAuth]);

  const previewVoice = useCallback(async (voice) => {
    console.log('[audio][frontend] voice_preview_request', { voice });
    const resp = await apiFetch('/tts-preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voice })
    });
    const data = await resp.json();
    if (!resp.ok || !data.audio) {
      throw new Error(data.error || 'Voice preview failed.');
    }
    console.log('[audio][frontend] voice_preview_received', {
      voice,
      mimeType: data.audioMimeType || 'audio/wav',
      bytes: data.audio.length
    });
    const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], { type: data.audioMimeType || 'audio/wav' }));
    const audio = new Audio(url);
    audio.preload = 'auto';
    audio.playsInline = true;
    try {
      await audio.play();
      console.log('[audio][frontend] voice_preview_started', { voice });
      await new Promise((resolve, reject) => {
        audio.onended = resolve;
        audio.onerror = () => reject(new Error('Preview playback failed.'));
      });
      console.log('[audio][frontend] voice_preview_complete', { voice });
    } catch (err) {
      console.error('[audio][frontend] voice_preview_failed', { voice, error: err.message });
      throw err;
    } finally {
      URL.revokeObjectURL(url);
    }
  }, []);

  const submitAuth = async () => {
    const userId = authUserId.trim();
    const password = authPassword;
    if (!userId || !password) {
      setAuthError('Enter both a user ID and password.');
      return;
    }

    setAuthBusy(true);
    setAuthError('');
    try {
      const r = await fetch(authMode === 'register' ? '/auth/register' : '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, password })
      });
      const d = await r.json();
      if (!r.ok || !d.token) {
        setAuthError(d.error || 'Authentication failed.');
      } else {
        persistSession(d.token, d.userId || userId);
        setAuthPassword('');
        setIsAuth(true);
      }
    } catch {
      setAuthError('Network error. Try again.');
    } finally {
      setAuthBusy(false);
    }
  };

  if (!isAuth) return (
    <div className="auth-overlay">
      <div className="auth-card">
        <h2>Welcome to Oxy</h2>
        <p>{authMode === 'register' ? 'Create your personal Oxy account' : 'Sign in to your Oxy account'}</p>
        <input type="text" className="auth-input" placeholder="User ID" value={authUserId} onChange={e => setAuthUserId(e.target.value)} />
        <input type="password" className="auth-input" placeholder={authMode === 'register' ? 'Password (8+ characters)' : 'Password'} value={authPassword} onChange={e => setAuthPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && !authBusy && submitAuth()} />
        {authError && <div style={{color:'var(--red)',fontSize:'12px',marginBottom:'10px'}}>{authError}</div>}
        <button className="auth-btn" onClick={submitAuth} disabled={authBusy}>
          {authBusy ? 'Please wait…' : authMode === 'register' ? 'Create Account' : 'Sign In'}
        </button>
        <button
          onClick={() => { setAuthMode(authMode === 'register' ? 'login' : 'register'); setAuthError(''); }}
          style={{marginTop:'14px',background:'none',border:'none',color:'var(--sub)',fontSize:'12px',cursor:'pointer',fontFamily:'var(--font)'}}
        >
          {authMode === 'register' ? 'Already have an account? Sign in' : 'Need an account? Register'}
        </button>
      </div>
    </div>
  );

  const navItems = [
    { id: 'chat',       label: 'Chat',       icon: Icons.chat },
    { id: 'history',    label: 'History',    icon: Icons.history },
    { id: 'connectors', label: 'Connectors', icon: Icons.connectors },
    { id: 'memory',     label: 'Memory',     icon: Icons.memory },
    { id: 'settings',   label: 'Settings',   icon: Icons.settings },
  ];

  const titles = { chat: 'Oxy', history: 'History', connectors: 'Connectors', memory: 'Memory', settings: 'Settings' };

  return (
    <div className="app">
      {/* Desktop sidebar */}
      <div className="sidebar">
        <div className="logo">
          <div className="logo-name">{settings.name}</div>
          <div className="logo-sub">
            <span className="status-dot" style={isRecording ? {background:'var(--red)',boxShadow:'0 0 6px rgba(192,80,62,0.5)'} : {}} />
            {isRecording ? 'Listening…' : isProcessing ? 'Processing…' : 'Online'}
          </div>
        </div>
        <nav className="nav">
          {navItems.map(n => (
            <button key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="status" style={{fontSize:'10px',fontWeight:500,letterSpacing:'1px',textTransform:'uppercase',color:'var(--dim)'}}>
            Wearable AI
          </div>
          <button
            className="stop-btn"
            style={{marginLeft:0, marginTop:'10px'}}
            onClick={() => {
              clearSession();
              setBriefing(null);
              setMemory('');
              setPeople([]);
              setIsAuth(false);
            }}
          >
            Sign out
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{titles[page]}</span>
        </div>

        {page === 'chat' && (
          <>
            <ChatPage settings={settings} memory={memory} people={people} initialQuery={initialQuery} proactiveBriefing={briefing} onRecordingChange={setIsRecording} onProcessingChange={setIsProcessing} />
            {briefing?.actions?.length > 0 && <AutoRunActions actions={briefing.actions} />}
          </>
        )}
        {page === 'history'    && <ActionHistoryPage />}
        {page === 'connectors' && <ConnectorsPage />}
        {page === 'memory'     && <MemoryPage />}
        {page === 'settings'   && <SettingsPage settings={settings} setSettings={setSettings} onPreviewVoice={previewVoice} />}
      </div>

      {/* Mobile nav */}
      <div className="mobile-nav">
        {navItems.map(n => (
          <button key={n.id} className={`mob-nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
            <span className="mob-nav-icon">{n.icon}</span>
            {n.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
