<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oxy">
<meta name="theme-color" content="#0C0C0C">
<title>Oxy</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0C0C0C;
  --s1:     #151515;
  --s2:     #1E1E1E;
  --s3:     #282828;
  --s4:     #333333;
  --line:   rgba(255,255,255,0.06);
  --line2:  rgba(255,255,255,0.10);
  --text:   #F2F2F2;
  --sub:    #888888;
  --dim:    #505050;
  --stone:  #C8B89A;
  --green:  #4CAF82;
  --red:    #C0503E;
  --font:   'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

#root { height: 100%; }

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}

/* ── APP ── */
.app { display: flex; height: 100%; }

/* ── SIDEBAR ── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--s1);
  border-right: 1px solid var(--line);
}

@media (max-width: 768px) { .sidebar { display: none; } }

.logo {
  padding: 26px 20px 20px;
  border-bottom: 1px solid var(--line);
}

.logo-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}

.logo-sub {
  margin-top: 8px;
  font-size: 11px;
  font-weight: 400;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0;
  text-transform: none;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(76,175,130,0.5);
}

.nav {
  flex: 1;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 10px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 400;
  color: var(--dim);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  width: 100%;
  text-align: left;
  transition: color 0.13s;
  position: relative;
}

.nav-item:hover { color: var(--sub); }

.nav-item.active {
  color: var(--text);
  font-weight: 500;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 25%;
  height: 50%;
  width: 2px;
  border-radius: 2px;
  background: var(--stone);
}

.nav-icon {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  opacity: 0.4;
  transition: opacity 0.13s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-icon svg { width: 15px; height: 15px; }

.nav-item:hover  .nav-icon { opacity: 0.65; }
.nav-item.active .nav-icon { opacity: 1; }

.sidebar-bottom {
  padding: 16px 20px;
  border-top: 1px solid var(--line);
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
}

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

@media (max-width: 768px) { .main { padding-bottom: 64px; } }

/* ── TOPBAR ── */
.topbar {
  height: 50px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 32px;
  border-bottom: 1px solid var(--line);
  gap: 8px;
  background: var(--bg);
  z-index: 10;
}

@media (max-width: 768px) { .topbar { padding: 0 20px; } }

.topbar-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.1px;
}

.topbar-badge {
  font-size: 11.5px;
  color: var(--sub);
  font-weight: 400;
  margin-left: 6px;
}

.topbar-badge::before { content: '· '; }

/* ── CHAT ── */
.chat-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 30px 64px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scrollbar-width: none;
}

.messages::-webkit-scrollbar { display: none; }

@media (max-width: 768px) {
  .messages { padding: 22px 20px 16px; }
}

.message { display: flex; flex-direction: column; }
.message.user { align-items: flex-end; }
.message.oxcy { align-items: flex-start; max-width: 540px; }

/* Oxy speaks — no bubble, pure type */
.message.oxcy .msg-bubble {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text);
  letter-spacing: -0.1px;
  background: none;
  border: none;
  padding: 0;
  box-shadow: none;
  border-radius: 0;
}

/* User message — quiet container */
.message.user .msg-bubble {
  max-width: 440px;
  background: var(--s2);
  border: 1px solid var(--line2);
  border-radius: 18px;
  border-bottom-right-radius: 5px;
  padding: 12px 17px;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: -0.1px;
  box-shadow: none;
}

.msg-time {
  font-size: 10.5px;
  color: var(--dim);
  margin-top: 7px;
  font-weight: 400;
  padding: 0;
}

/* Audio play button */
.msg-play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--s3);
  border: 1px solid var(--line2);
  color: var(--sub);
  cursor: pointer;
  margin-left: 10px;
  font-size: 9px;
  transition: background 0.13s, color 0.13s;
  vertical-align: middle;
}
.msg-play-btn:hover { background: var(--s4); color: var(--text); }

/* Action results — quiet lines */
.msg-actions-bar {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.msg-action-status {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  font-size: 12px;
  font-weight: 400;
  padding: 11px 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.02);
  border-radius: 14px;
  letter-spacing: 0;
}

.msg-action-copy {
  min-width: 0;
}

.msg-action-title {
  color: var(--text);
  font-size: 12.5px;
}

.msg-action-sub {
  margin-top: 4px;
  color: var(--sub);
  font-size: 11px;
  line-height: 1.45;
}

.msg-action-status.ok  { border-color: rgba(76,175,130,0.18); }
.msg-action-status.fail { border-color: rgba(192,80,62,0.22); }

.msg-action-pill {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  white-space: nowrap;
}

.msg-action-status.ok .msg-action-pill {
  color: var(--green);
  background: rgba(76,175,130,0.12);
}

.msg-action-status.fail .msg-action-pill {
  color: var(--red);
  background: rgba(192,80,62,0.12);
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}

.typing span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--dim);
  animation: pulse 1.2s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
  40%           { opacity: 1;   transform: scale(1); }
}

/* Date separators */
.date-separator {
  text-align: center;
  margin: 12px 0 4px;
  position: relative;
  flex-shrink: 0;
}
.date-separator span {
  background: var(--bg);
  padding: 0 12px;
  font-size: 11px;
  color: var(--stone);
  position: relative;
  z-index: 1;
  letter-spacing: 0.02em;
}
.date-separator::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: var(--line2);
}

/* Search */
.search-toggle-btn {
  position: absolute;
  top: 14px;
  right: 20px;
  z-index: 10;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.search-toggle-btn:hover { color: var(--text); border-color: var(--line2); background: var(--s3); }
.search-toggle-btn svg { width: 14px; height: 14px; }

.search-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--line2);
  padding: 12px 20px;
}
.search-bar-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.search-input {
  flex: 1;
  background: var(--s3);
  border: 1px solid var(--line2);
  border-radius: 8px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-input:focus { border-color: var(--stone); }
.date-input {
  background: var(--s3);
  border: 1px solid var(--line2);
  border-radius: 8px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  color-scheme: dark;
}
.date-input:focus { border-color: var(--stone); }
.search-close-btn {
  background: transparent;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
}
.search-close-btn:hover { color: var(--text); }
.search-results {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 220px;
  overflow-y: auto;
}
.search-result {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.search-result:hover { background: var(--s3); }
.sr-role { font-size: 10px; color: var(--stone); flex-shrink: 0; font-weight: 500; }
.sr-content { font-size: 12.5px; color: var(--sub); flex: 1; }
.sr-time { font-size: 10px; color: var(--dim); flex-shrink: 0; }

/* History banner */
.history-banner {
  background: var(--s3);
  border-bottom: 1px solid var(--line2);
  padding: 8px 20px;
  font-size: 12px;
  color: var(--sub);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.history-back-btn {
  background: transparent;
  border: none;
  color: var(--stone);
  font-size: 12px;
  cursor: pointer;
  padding: 0;
}
.history-back-btn:hover { opacity: 0.8; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.empty-orb {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--line2);
  background: var(--s1);
}

.empty-text {
  font-size: 13px;
  color: var(--dim);
  font-weight: 400;
}

.prompt-chips {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  max-width: 360px;
  width: 100%;
  margin-top: 6px;
}

.prompt-chip {
  background: var(--s1);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 13px 15px;
  cursor: pointer;
  text-align: left;
  font-family: var(--font);
  transition: border-color 0.13s, background 0.13s;
  line-height: 1.4;
}

.prompt-chip:hover { border-color: var(--line2); background: var(--s2); }
.prompt-chip-icon  { font-size: 15px; margin-bottom: 6px; display: block; }
.prompt-chip-label { font-size: 12.5px; color: var(--text); display: block; font-weight: 500; }
.prompt-chip-sub   { font-size: 11px; color: var(--dim); display: block; margin-top: 2px; }

.new-chat-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  transition: color 0.13s, border-color 0.13s;
  white-space: nowrap;
}
.new-chat-btn:hover { color: var(--text); border-color: rgba(200,184,154,0.3); }

/* Speaking bar */
.speaking-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 64px;
  border-top: 1px solid var(--line);
  font-size: 11.5px;
  color: var(--sub);
  font-weight: 400;
  flex-shrink: 0;
}

@media (max-width: 768px) { .speaking-bar { padding: 9px 20px; } }

.speaking-waves {
  display: flex;
  gap: 2px;
  align-items: center;
}

.speaking-waves span {
  width: 2px;
  border-radius: 2px;
  background: var(--stone);
  animation: wave 0.8s ease-in-out infinite;
}

.speaking-waves span:nth-child(1) { height: 7px;  animation-delay: 0s; }
.speaking-waves span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.speaking-waves span:nth-child(3) { height: 9px;  animation-delay: 0.2s; }
.speaking-waves span:nth-child(4) { height: 14px; animation-delay: 0.15s; }
.speaking-waves span:nth-child(5) { height: 7px;  animation-delay: 0.05s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
  50%       { transform: scaleY(1);   opacity: 1; }
}

.stop-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--line2);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.13s, border-color 0.13s;
}
.stop-btn:hover { color: var(--text); border-color: var(--line2); }

/* ── INPUT ── */
.chat-input-area {
  flex-shrink: 0;
  padding: 12px 64px 28px;
  background: var(--bg);
}

@media (max-width: 768px) { .chat-input-area { padding: 10px 16px 20px; } }

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--s1);
  border: 1px solid var(--line2);
  border-radius: 16px;
  padding: 11px 11px 11px 18px;
  transition: border-color 0.2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}

.input-row:focus-within {
  border-color: rgba(200,184,154,0.28);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 0 0 3px rgba(200,184,154,0.07);
}

.chat-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  min-height: 22px;
  max-height: 160px;
  font-weight: 400;
  padding: 0;
}

.chat-input::placeholder { color: var(--dim); }

.mic-btn {
  width: 33px;
  height: 33px;
  border-radius: 9px;
  border: 1px solid var(--line2);
  background: var(--s2);
  color: var(--sub);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 14px;
  transition: background 0.13s, color 0.13s;
}
.mic-btn:hover { background: var(--s3); color: var(--text); }

.mic-btn.recording {
  background: rgba(192,80,62,0.15);
  border-color: rgba(192,80,62,0.4);
  color: var(--red);
  animation: mic-pulse 1.5s ease-in-out infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,80,62,0.3); }
  50%       { box-shadow: 0 0 0 5px rgba(192,80,62,0); }
}

.send-btn {
  width: 33px;
  height: 33px;
  border-radius: 9px;
  border: none;
  background: var(--text);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 16px;
  transition: opacity 0.13s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.send-btn:hover { opacity: 0.88; }
.send-btn:active { opacity: 0.75; }
.send-btn:disabled { background: var(--s3); color: var(--dim); box-shadow: none; cursor: not-allowed; }

/* ── PAGE CONTENT ── */
.page-content {
  flex: 1;
  overflow-y: auto;
  padding: 40px 64px;
  scrollbar-width: none;
}

.page-content::-webkit-scrollbar { display: none; }

@media (max-width: 768px) { .page-content { padding: 24px 20px; } }

.section { margin-bottom: 32px; }

.section-title {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
  font-family: var(--font);
}

/* Card */
.memory-card, .settings-group {
  background: var(--s1);
  border: 1px solid var(--line);
  border-radius: 13px;
  overflow: hidden;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

.memory-textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font);
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
  min-height: 100px;
  padding: 15px 18px;
  font-weight: 400;
}
.memory-textarea::placeholder { color: var(--dim); }

.memory-footer {
  border-top: 1px solid var(--line);
  padding: 10px 18px 12px;
  display: flex;
  justify-content: flex-end;
}

.save-btn {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 500;
  border: 1px solid var(--line2);
  background: var(--s2);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font);
  letter-spacing: -0.1px;
  transition: background 0.13s;
  text-transform: none;
  letter-spacing: 0;
}
.save-btn:hover { background: var(--s3); }

/* Setting rows */
.setting-row {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  gap: 14px;
}
.setting-row:last-child { border-bottom: none; }

.setting-info { flex: 1; }
.setting-label { font-size: 13.5px; color: var(--text); font-weight: 400; margin-bottom: 0; }
.setting-desc { font-size: 11.5px; color: var(--sub); margin-top: 2px; }

.setting-input {
  background: var(--s2);
  border: 1px solid var(--line2);
  border-radius: 7px;
  padding: 7px 11px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
  width: 140px;
  transition: border-color 0.15s;
}
.setting-input:focus { border-color: rgba(200,184,154,0.3); }

/* Toggle */
.toggle {
  width: 38px;
  height: 22px;
  border-radius: 11px;
  background: var(--s4);

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const DEFAULT_SETTINGS = { name: 'Oxy', voice: 'Aoede', voiceOn: true, autonomy: 'Medium' };
const VOICE_OPTIONS = [
  'Aoede', 'Achernar', 'Achird', 'Algenib', 'Algieba', 'Alnilam', 'Autonoe',
  'Callirrhoe', 'Charon', 'Despina', 'Enceladus', 'Erinome', 'Fenrir', 'Gacrux',
  'Iapetus', 'Kore', 'Laomedeia', 'Leda', 'Orus', 'Puck', 'Pulcherrima',
  'Rasalgethi', 'Sadachbia', 'Sadaltager', 'Schedar', 'Sulafat', 'Umbriel',
  'Vindemiatrix', 'Zephyr', 'Zubenelgenubi'
];

// INJECT_CREDENTIALS

let AUTH_TOKEN = window.OXY_INJECTED_TOKEN || localStorage.getItem('oxy_auth_token');
let USER_ID    = window.OXY_INJECTED_USER  || localStorage.getItem('oxy_user_id') || '';

const apiFetch = async (url, options = {}) => {
  const headers = { ...options.headers };
  if (AUTH_TOKEN) headers.Authorization = `Bearer ${AUTH_TOKEN}`;
  return fetch(url, { ...options, headers });
};

function withAuthToken(url) {
  if (!AUTH_TOKEN) return url;
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}authToken=${encodeURIComponent(AUTH_TOKEN)}`;
}

function persistSession(token, userId) {
  AUTH_TOKEN = token;
  USER_ID = userId;
  localStorage.setItem('oxy_auth_token', token);
  localStorage.setItem('oxy_user_id', userId);
  localStorage.removeItem('oxcy_secret');
  localStorage.removeItem('oxcy_userId');
}

function clearSession() {
  AUTH_TOKEN = '';
  USER_ID = '';
  localStorage.removeItem('oxy_auth_token');
  localStorage.removeItem('oxy_user_id');
  localStorage.removeItem('oxcy_secret');
  localStorage.removeItem('oxcy_userId');
}

function formatMsgTime(date) {
  return (date instanceof Date ? date : new Date(date))
    .toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function formatDateHeader(date) {
  const d = new Date(date instanceof Date ? date : new Date(date));
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const cmp = new Date(d); cmp.setHours(0, 0, 0, 0);
  if (cmp.getTime() === today.getTime()) return 'Today';
  if (cmp.getTime() === yesterday.getTime()) return 'Yesterday';
  return cmp.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

/* ── SVG ICONS ── */
const Icons = {
  chat: (
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">

  ),

    </svg>
  ),

  ),
  send: (
    <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

  ),
};

function AutoRunActions({ actions }) {
  const [ran, setRan] = useState(false);
  const [blocked, setBlocked] = useState(false);

  useEffect(() => {
    if (!actions || actions.length === 0) return;
    actions.forEach((action, i) => {
      setTimeout(() => {
        const shortcutUrl = `shortcuts://run-shortcut?name=Oxy&input=${encodeURIComponent(JSON.stringify(action))}`;
        const link = document.createElement('a');
        link.href = shortcutUrl;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        apiFetch('/action-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: USER_ID, action, status: 'executed' })
        }).catch(() => {});
      }, i * 800);
    });
    setRan(true);
    setTimeout(() => { if (document.hidden) setRan(true); else setBlocked(true); }, 5000);
  }, [actions]);

  if (ran) return null;
  if (blocked) return (
    <div className="action-hint">
      If the shortcut didn't run, open it once from iOS to grant permission.
    </div>
  );
  return null;
}

function ChatPage({ settings, memory, people, initialQuery, onRecordingChange, onProcessingChange }) {
  const [messages, setMessages] = useState([]);
  const [recentActions, setRecentActions] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [recording, setRecording] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [viewingDate, setViewingDate] = useState(null);
  const setRecordingWithCb = v => { setRecording(v); onRecordingChange?.(v); };
  const setLoadingWithCb   = v => { setLoading(v);   onProcessingChange?.(v); };
  const messagesEndRef    = useRef(null);
  const textareaRef       = useRef(null);
  const audioRef          = useRef(null);
  const mediaRecorderRef  = useRef(null);
  const chunksRef         = useRef([]);

  const loadHistory = useCallback(() => {
    apiFetch('/history/' + USER_ID)
      .then(r => r.json())
      .then(data => {
        if (data.history && data.history.length > 0) {
          setMessages(data.history.map(m => ({ role: m.role, content: m.content, time: new Date(m.created_at) })));
        }
      })
      .catch(() => {});
  }, []);

  const loadRecentActions = useCallback(() => {
    apiFetch('/action-log/' + USER_ID)
      .then(r => r.json())
      .then(data => { if (data.actions) setRecentActions(data.actions.slice(0, 4)); })
      .catch(() => {});
  }, []);

  useEffect(() => { loadHistory(); loadRecentActions(); }, []);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const autoSend = useRef(false);
  useEffect(() => {
    if (initialQuery && !autoSend.current && messages.length === 0) {
      autoSend.current = true;
      sendMessage(initialQuery);
    }
  }, [initialQuery]);

  const stopSpeaking = () => {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    setSpeaking(false);
  };

  const runSearch = useCallback(async (q) => {
    if (!q.trim()) { setSearchResults([]); return; }
    try {
      const r = await apiFetch(`/history/${USER_ID}/search?q=${encodeURIComponent(q)}`).then(r => r.json());
      setSearchResults(r.results || []);
    } catch {}
  }, []);

  const jumpToDate = useCallback(async (date) => {
    if (!date) return;
    try {
      const r = await apiFetch(`/history/${USER_ID}/date?date=${date}`).then(r => r.json());
      if (r.history?.length) {
        setMessages(r.history.map(m => ({ role: m.role, content: m.content, time: new Date(m.created_at) })));
        setViewingDate(date);
        setSearchOpen(false);
        setSearchResults([]);
        setSearchQuery('');
      }
    } catch {}
  }, []);

  const jumpToMessage = useCallback((msg) => {
    jumpToDate(msg.created_at.slice(0, 10));
  }, [jumpToDate]);

  const playAudioFromBase64 = useCallback(async (base64Audio) => {
    if (!base64Audio) return;
    try {
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current = null;
      }
      setSpeaking(true);
      const bytes = new Uint8Array(atob(base64Audio).split('').map(c => c.charCodeAt(0)));
      const url   = URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' }));
      const audio = new Audio(url);
      audio.preload = 'auto';
      audio.playsInline = true;
      audioRef.current = audio;
      const cleanup = () => {
        setSpeaking(false);
        if (audioRef.current === audio) audioRef.current = null;
        URL.revokeObjectURL(url);
      };
      audio.onended = cleanup;
      audio.onerror = cleanup;
      await audio.play();
    } catch (err) {
      console.error('Audio playback error:', err);
      setSpeaking(false);
    }
  }, []);

  const startRecording = async () => {
    try {
      const stream        = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorderRef.current = mediaRecorder;
      chunksRef.current = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mediaRecorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); await sendAudio(); };
      mediaRecorder.start();
      setRecordingWithCb(true);
      stopSpeaking();
    } catch (err) { console.error('Mic error:', err); }
  };

  const stopRecording = () => {
    if (mediaRecorderRef.current?.state === 'recording') {
      mediaRecorderRef.current.stop();
      setRecordingWithCb(false);
    }
  };

  const webmToWav = async (webmBlob) => {
    const ctx    = new (window.AudioContext || window.webkitAudioContext)();
    const buf    = await ctx.decodeAudioData(await webmBlob.arrayBuffer());
    const len    = buf.length;
    const sr     = buf.sampleRate;
    const wavBuf = new ArrayBuffer(44 + len * 2);
    const view   = new DataView(wavBuf);
    const ws     = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); view.setUint32(4,36+len*2,true); ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
    view.setUint32(24,sr,true); view.setUint32(28,sr*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
    ws(36,'data'); view.setUint32(40,len*2,true);
    const ch = buf.getChannelData(0);
    let offset = 44;
    for (let i = 0; i < len; i++) {
      const s = Math.max(-1, Math.min(1, ch[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return new Blob([wavBuf], { type: 'audio/wav' });
  };

  const sendAudio = async () => {
    setLoadingWithCb(true);
    const placeholderId = Date.now();
    try {
      const wavBlob  = await webmToWav(new Blob(chunksRef.current, { type: 'audio/webm' }));
      const formData = new FormData();
      formData.append('audio', wavBlob, 'audio.wav');
      formData.append('userId', USER_ID);
      formData.append('voice', settings.voice);
      const response = await apiFetch('/process-audio', { method: 'POST', body: formData });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split('\n\n');
        buf = events.pop();
        for (const event of events) {
          const line = event.split('\n').find(l => l.startsWith('data: '));
          if (!line) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'transcription') {
              setMessages(prev => [...prev, { role: 'user', content: ev.text, time: new Date(), _id: placeholderId }]);
            }
            if (ev.type === 'response') {
              const m = { role: 'assistant', content: ev.text, time: new Date() };
              if (ev.actions?.length) m.actions = ev.actions;
              setMessages(prev => [...prev, m]);
            }
            if (ev.type === 'audio') {
              playAudioFromBase64(ev.data);
            }
            if (ev.type === 'error') {
              console.error('Audio processing error:', ev.error);
            }
          } catch {}
        }
      }
    } catch (err) { console.error('Audio error:', err); }
    setLoadingWithCb(false);
  };

  const sendMessage = useCallback(async (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading) return;
    setMessages(prev => [...prev, { role: 'user', content: text, time: new Date() }]);
    if (!overrideText) setInput('');
    setLoadingWithCb(true);
    stopSpeaking();
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    try {
      const params = new URLSearchParams({ stream: 'true' });
      if (settings.voiceOn) params.set('tts', 'true');
      const resp = await apiFetch(`/chat?${params}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, userId: USER_ID, settings, memory, people })
      });

      // Add a placeholder assistant message that we'll update as tokens stream in
      const placeholderId = Date.now();
      setMessages(prev => [...prev, { role: 'assistant', content: '', time: new Date(), _streamId: placeholderId }]);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let streamedText = '';
      let streamActions = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'text') {
              streamedText += ev.chunk;
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId ? { ...m, content: streamedText } : m
              ));
            }
            if (ev.type === 'actions' && ev.results?.length) {
              streamActions = ev.results;
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId ? { ...m, actions: ev.results } : m
              ));
              ev.results.forEach(a => {
                if (a.result?.deepLink) window.location.href = a.result.deepLink;
              });
            }
            if (ev.type === 'audio') {
              playAudioFromBase64(ev.data);
            }
            if (ev.type === 'error') {
              streamedText = ev.error || 'Something went wrong.';
              setMessages(prev => prev.map(m =>
                m._streamId === placeholderId ? { ...m, content: streamedText } : m
              ));
            }
          } catch {}
        }
      }

      // Finalize: remove stream marker
      if (!streamedText) streamedText = 'Something went wrong.';
      setMessages(prev => prev.map(m => {
        if (m._streamId !== placeholderId) return m;
        const final = { role: 'assistant', content: streamedText, time: m.time };
        if (streamActions) final.actions = streamActions;
        return final;
      }));
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Connection failed.', time: new Date() }]);
    }
    setLoadingWithCb(false);
  }, [input, loading, settings, memory, people]);

  const handleKeyDown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const handleInput = e => {
    setInput(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 140) + 'px';
  };

  const recentContacts = people.slice(0, 3).map(p => p.name);
  const formatActionTitle = (entry) => {
    const raw = entry?.action;
    if (!raw) return 'Action';
    if (typeof raw === 'string') return raw.replace(/_/g, ' ');
    return (raw.type || raw.action || 'Action').replace(/_/g, ' ');
  };
  const formatTrailStatus = (status) => {
    if (!status) return 'Done';
    const normalized = String(status).toLowerCase();
    if (normalized === 'executed' || normalized === 'completed' || normalized === 'success') return 'Done';
    if (normalized === 'pending') return 'Pending';
    if (normalized === 'failed' || normalized === 'error') return 'Failed';
    return normalized.replace(/_/g, ' ');
  };

  return (
    <div className="chat-page">
      <button className="search-toggle-btn" onClick={() => setSearchOpen(o => !o)} title="Search messages">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round">
          <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
        </svg>
      </button>
      {searchOpen && (
        <div className="search-overlay">
          <div className="search-bar-row">
            <input
              className="search-input"
              autoFocus
              placeholder="Search messages…"
              value={searchQuery}
              onChange={e => { setSearchQuery(e.target.value); runSearch(e.target.value); }}
            />
            <input
              type="date"
              className="date-input"
              onChange={e => jumpToDate(e.target.value)}
            />
            <button className="search-close-btn" onClick={() => { setSearchOpen(false); setSearchResults([]); setSearchQuery(''); }}>✕</button>
          </div>
          {searchResults.length > 0 && (
            <div className="search-results">
              {searchResults.map((r, i) => (
                <div key={i} className="search-result" onClick={() => jumpToMessage(r)}>
                  <span className="sr-role">{r.role === 'user' ? 'You' : 'Oxy'}</span>
                  <span className="sr-content">{r.content.length > 90 ? r.content.slice(0, 90) + '…' : r.content}</span>
                  <span className="sr-time">{formatMsgTime(new Date(r.created_at))}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {viewingDate && (
        <div className="history-banner">
          Viewing {new Date(viewingDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}
          <button className="history-back-btn" onClick={() => { setViewingDate(null); loadHistory(); }}>Back to latest →</button>
        </div>
      )}
      <div className="messages">
        {messages.length === 0 && !loading && (
          <div className="empty-state">
            <div className="empty-text">{settings.name}</div>
            <div className="prompt-chips">
              {[
                { icon: '📨', label: `Message ${people[0]?.name || 'a contact'}`, sub: 'Send via iMessage', prompt: `Send a message to ${people[0]?.name || 'someone'}` },
                { icon: '⏰', label: 'Set a reminder',   sub: 'For any time or task', prompt: 'Set a reminder for tomorrow' },
                { icon: '🚕', label: 'Arrange transport',   sub: 'Set the journey in motion', prompt: 'Book me an Uber to the station' },
                { icon: '☀️', label: 'Morning briefing', sub: "What's on today", prompt: 'Give me my morning briefing' },
              ].map((chip, i) => (
                <button key={i} className="prompt-chip" onClick={() => sendMessage(chip.prompt)}>
                  <span className="prompt-chip-icon">{chip.icon}</span>
                  <span className="prompt-chip-label">{chip.label}</span>
                  <span className="prompt-chip-sub">{chip.sub}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((msg, i) => {
          const msgDate = msg.time instanceof Date ? msg.time : new Date(msg.time);
          const prevDate = i > 0 ? (messages[i-1].time instanceof Date ? messages[i-1].time : new Date(messages[i-1].time)) : null;
          const showDateHeader = !prevDate || msgDate.toDateString() !== prevDate.toDateString();
          return (
            <React.Fragment key={i}>
              {showDateHeader && (
                <div className="date-separator"><span>{formatDateHeader(msgDate)}</span></div>
              )}
              <div className={`message ${msg.role === 'user' ? 'user' : 'oxcy'}`}>
                <div className="msg-bubble">
                  {msg.content}
                  {msg.audio && (
                    <button className="msg-play-btn" onClick={() => playAudioFromBase64(msg.audio)} title="Play">▶</button>
                  )}
                </div>
                {msg.actions && msg.actions.length > 0 && (
                  <div className="msg-actions-bar">
                    {msg.actions.map((a, j) => {
                      const ok = a.result?.success !== false;
                      const type = a.action || a.type || 'action';
                      const label = type === 'book_uber' ? `Uber — ${a.result?.text || 'opening app'}`
                                  : type === 'send_email' ? 'Email sent'
                                  : type === 'create_calendar_event' ? 'Event created'
                                  : type === 'get_emails' ? 'Emails fetched'
                                  : type === 'get_calendar_events' ? 'Calendar fetched'
                                  : type === 'send_telegram' ? `Telegram — ${a.result?.text || 'message sent'}`
                                  : type === 'get_telegram_contacts' ? `${a.result?.text || 'Contacts fetched'}`
                                  : type === 'search_trains' ? (a.result?.trains?.length ? 'Train times' : 'Trainline')
                                  : type;
                      return (
                        <span key={j} className={`msg-action-status ${ok ? 'ok' : 'fail'}`}>
                          <span className="msg-action-copy">
                            <span className="msg-action-title">{label}</span>
                            <span className="msg-action-sub">
                              {a.result?.error || a.result?.text || 'Completed without extra detail.'}
                              {type === 'search_trains' && a.result?.bookingUrl ? ' Book on Trainline from the link in the result.' : ''}
                            </span>
                          </span>
                          <span className="msg-action-pill">{ok ? 'done' : 'failed'}</span>
                        </span>
                      );
                    })}
                  </div>
                )}
                <div className="msg-time">{formatMsgTime(msgDate)}</div>
              </div>
            </React.Fragment>
          );
        })}
        {loading && (
          <div className="message oxcy">
            <div className="typing"><span/><span/><span/></div>
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {speaking && (
        <div className="speaking-bar">
          <div className="speaking-waves"><span/><span/><span/><span/><span/></div>
          {settings.name} is speaking
          <button className="stop-btn" onClick={stopSpeaking}>Stop</button>
        </div>
      )}

      <div className="chat-input-area">
        <div className="input-row">
          <textarea
            ref={textareaRef}
            className="chat-input"
            placeholder={`Message ${settings.name}…`}
            value={input}
            onChange={handleInput}
            onKeyDown={handleKeyDown}
            rows={1}
          />
          {input.trim() ? (
            <button className="send-btn" onClick={() => sendMessage()} disabled={loading}>
              <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:13,height:13}}>{Icons.send}</span>
            </button>
          ) : (
            <button
              className={`mic-btn ${recording ? 'recording' : ''}`}
              onMouseDown={startRecording}
              onMouseUp={stopRecording}
              onTouchStart={startRecording}
              onTouchEnd={stopRecording}
              title="Hold to record"
            >
              <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:14,height:14}}>{Icons.mic}</span>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function TelegramAuthModal({ onSuccess, onClose }) {
  const [step, setStep]   = useState('phone'); // phone | code | twofa
  const [phone, setPhone] = useState('');
  const [code, setCode]   = useState('');
  const [pass, setPass]   = useState('');
  const [busy, setBusy]   = useState(false);
  const [err,  setErr]    = useState('');

  const submitPhone = async () => {
    if (!phone.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, phone: phone.trim() })
      });
      const d = await r.json();
      if (d.success) setStep('code');
      else setErr(d.error || 'Failed to send code');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const submitCode = async () => {
    if (!code.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, code: code.trim() })
      });
      const d = await r.json();
      if (d.success && !d.requires2FA) onSuccess();
      else if (d.success && d.requires2FA) setStep('twofa');
      else setErr(d.error || 'Invalid code');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const submit2FA = async () => {
    if (!pass.trim()) return;
    setBusy(true); setErr('');
    try {
      const r = await apiFetch('/auth/telegram/2fa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: USER_ID, password: pass })
      });
      const d = await r.json();
      if (d.success) onSuccess();
      else setErr(d.error || 'Wrong password');
    } catch { setErr('Network error'); }
    setBusy(false);
  };

  const stepConfig = {
    phone: { title: 'Connect Telegram', sub: 'Enter your phone number in international format', label: 'Phone number', value: phone, onChange: setPhone, placeholder: '+447...', onSubmit: submitPhone, btnText: 'Send code' },
    code:  { title: 'Enter Code',       sub: 'Check your Telegram app for the verification code', label: 'Verification code', value: code, onChange: setCode, placeholder: '12345', onSubmit: submitCode, btnText: 'Verify' },
    twofa: { title: 'Two-Factor Auth',  sub: 'Enter your Telegram 2FA password', label: 'Password', value: pass, onChange: setPass, placeholder: '••••••••', onSubmit: submit2FA, btnText: 'Confirm', type: 'password' },
  }[step];

  return (
    <div className="auth-overlay" style={{zIndex:500}} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="auth-card">
        <div style={{fontSize:'28px',marginBottom:'12px'}}>✈️</div>
        <h2>{stepConfig.title}</h2>
        <p>{stepConfig.sub}</p>
        <input
          className="auth-input"
          type={stepConfig.type || 'text'}
          placeholder={stepConfig.placeholder}
          value={stepConfig.value}
          onChange={e => stepConfig.onChange(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !busy && stepConfig.onSubmit()}
          autoFocus
        />
        {err && <div style={{color:'var(--red)',fontSize:'12px',marginBottom:'8px'}}>{err}</div>}
        <button className="auth-btn" onClick={stepConfig.onSubmit} disabled={busy}>
          {busy ? 'Please wait…' : stepConfig.btnText}
        </button>
        <button onClick={onClose} style={{marginTop:'14px',background:'none',border:'none',color:'var(--dim)',fontSize:'12px',cursor:'pointer',fontFamily:'var(--font)'}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function ConnectorsPage() {
  const [connectors, setConnectors] = useState([]);
  const [loading, setLoading] = useState(true);
  const [googleStatus, setGoogleStatus] = useState('idle'); // idle | connecting | connected | error
  const [telegramModal, setTelegramModal] = useState(false);

  const loadConnectors = () => {
    apiFetch(`/connectors/${USER_ID}`)
      .then(r => r.json())
      .then(d => {
        const list = d.connectors || [];
        setConnectors(list);
        const g = list.find(c => c.id === 'google');
        if (g?.enabled) setGoogleStatus('connected');
        setLoading(false);
      })
      .catch(() => setLoading(false));
  };

  useEffect(() => {
    loadConnectors();
    const onMsg = (e) => {
      if (e.data === 'google_auth_success') { setGoogleStatus('connected'); loadConnectors(); }
      if (e.data === 'google_auth_error')   { setGoogleStatus('error'); }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const connectGoogle = () => {
    setGoogleStatus('connecting');
    window.open(withAuthToken(`/auth/google?userId=${encodeURIComponent(USER_ID)}`), 'oxy_auth', 'width=500,height=600');
  };

  const toggle = async (id, enabled) => {
    if (id === 'telegram' && !enabled) {
      setTelegramModal(true);
      return;
    }
    await apiFetch('/connectors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: USER_ID, connectorId: id, enabled: !enabled })
    });
    setConnectors(prev => prev.map(c => c.id === id ? { ...c, enabled: !c.enabled } : c));
  };

  const onTelegramSuccess = async () => {
    setTelegramModal(false);
    await apiFetch('/connectors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: USER_ID, connectorId: 'telegram', enabled: true })
    });
    loadConnectors();
  };

  if (loading) return (
    <div className="page-content" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
      <span style={{color:'var(--dim)'}}>Loading…</span>
    </div>
  );

  const nonGoogle = connectors.filter(c => c.id !== 'google');
  const grouped = nonGoogle.reduce((acc, c) => {
    acc[c.category] = acc[c.category] || [];
    acc[c.category].push(c);
    return acc;
  }, {});

  const googleBtnLabel = { idle: 'Connect', connecting: 'Connecting…', connected: 'Connected', error: 'Retry' }[googleStatus];
  const googleBtnStyle = googleStatus === 'connected'
    ? { background: 'rgba(52,168,83,0.15)', color: '#34A853', border: '1px solid rgba(52,168,83,0.3)' }
    : {};

  return (
    <div className="page-content">
      {telegramModal && (
        <TelegramAuthModal
          onSuccess={onTelegramSuccess}
          onClose={() => setTelegramModal(false)}
        />
      )}

      <div className="section">
        <div className="section-title">Google</div>
        <div className="hub-card">
          <div className="hub-info">
            <div className="hub-icon-box" style={{background:'linear-gradient(135deg,#4285F4,#34A853)'}}>
              <span style={{fontSize:'18px',fontWeight:700,color:'#fff'}}>G</span>
            </div>
            <div>
              <div className="hub-name">Google</div>
              <div className="hub-desc">Gmail · Calendar{googleStatus === 'connected' ? ' · Connected ✓' : ''}</div>
            </div>
          </div>
          <button className="save-btn" style={googleBtnStyle} onClick={connectGoogle} disabled={googleStatus === 'connecting' || googleStatus === 'connected'}>
            {googleBtnLabel}
          </button>
        </div>
      </div>

      {Object.entries(grouped).map(([cat, items]) => (
        <div key={cat} className="section">
          <div className="section-title">{cat}</div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', gap:'12px'}}>
            {items.map(c => (
              <div key={c.id} className="hub-item" style={!c.implemented ? {opacity:0.4, pointerEvents:'none'} : {}}>
                <div className="connector-icon">{c.icon}</div>
                <div className="connector-name">{c.name}{!c.implemented ? <span style={{display:'block',fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}>coming soon</span> : ''}</div>
                {c.implemented && <div className={`conn-toggle ${c.enabled ? 'on' : ''}`} onClick={() => toggle(c.id, c.enabled)} />}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function ActionHistoryPage() {
  const [actions, setActions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch(`/action-log/${USER_ID}`)
      .then(r => r.json())
      .then(d => { setActions(d.actions || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const formatAction = a => {
    if (!a) return '';
    if (typeof a === 'string') { try { const p = JSON.parse(a); return p.type === 'shortcut' ? p.name : p.type || a; } catch { return a; } }
    return a;
  };

  if (loading) return (
    <div className="page-content" style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
      <span style={{color:'var(--dim)'}}>Loading…</span>
    </div>
  );

  return (
    <div className="page-content">
      <div className="section">
        <div className="section-title">Action History</div>
        {actions.length === 0 ? (
          <div style={{color:'var(--dim)',fontSize:'13px',paddingTop:'8px'}}>No actions yet.</div>
        ) : (
          <div className="history-list">
            {actions.map((a, i) => (
              <div key={i} className="history-item">
                <div className="history-time">{new Date(a.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>
                <div className="history-action">{formatAction(a.action)}</div>
                <span className={`history-status status-${a.status}`}>{a.status}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsPage({ settings, setSettings }) {
  const [toast, setToast] = useState(false);
  const update = (k, v) => {
    setSettings(prev => {
      const next = { ...prev, [k]: v };
      localStorage.setItem('oxy_settings', JSON.stringify(next));
      return next;
    });
  };

  return (
    <div className="page-content">
      <div className="section">
        <div className="section-title">Identity</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Assistant Name</div>
            </div>
            <input className="setting-input" value={settings.name} onChange={e => update('name', e.target.value)} />
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Voice</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Voice Playback</div>
              <div className="setting-desc">Generate audio for responses</div>
            </div>
            <button className={`toggle ${settings.voiceOn ? 'on' : ''}`} onClick={() => update('voiceOn', !settings.voiceOn)} />
          </div>
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Gemini Voice</div>
              <div className="setting-desc">Choose the voice used for spoken replies</div>
            </div>
            <select className="setting-input" value={settings.voice} onChange={e => update('voice', e.target.value)}>
              {VOICE_OPTIONS.map(voice => <option key={voice} value={voice}>{voice}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Autonomy</div>
        <div className="settings-group">
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Initiative Level</div>
              <div className="setting-desc">How often Oxy proactively reaches out</div>
            </div>
            <div className="autonomy-options">
              {['Low','Medium','High'].map(l => (
                <button key={l} className={`autonomy-opt ${settings.autonomy === l ? 'active' : ''}`} onClick={() => update('autonomy', l)}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">Saved</div>}
    </div>
  );
}

function App() {
  const [isAuth,      setIsAuth]      = useState(!!AUTH_TOKEN && !!USER_ID);
  const [page,        setPage]        = useState('chat');
  const [chatKey,     setChatKey]     = useState(0);
  const [isRecording, setIsRecording] = useState(false);
  const [isProcessing,setIsProcessing]= useState(false);
  const [memory,      setMemory]      = useState('');
  const [people,      setPeople]      = useState([]);
  const [settings,    setSettings]    = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('oxy_settings') || 'null');
      return saved ? { ...DEFAULT_SETTINGS, ...saved } : DEFAULT_SETTINGS;
    } catch {
      return DEFAULT_SETTINGS;
    }
  });
  const handleNewChat = () => setChatKey(k => k + 1);
  const [briefing, setBriefing] = useState(null);
  const [initialQuery, setInitialQuery] = useState(null);
  const [authMode, setAuthMode] = useState('login');
  const [authUserId, setAuthUserId] = useState(USER_ID);
  const [authPassword, setAuthPassword] = useState('');
  const [authError, setAuthError] = useState('');
  const [authBusy, setAuthBusy] = useState(false);

  useEffect(() => {
    if (!isAuth) return;
    apiFetch(`/briefing/${USER_ID}`)
      .then(async r => {
        if (r.status === 401) {
          clearSession();
          setIsAuth(false);
          return {};
        }
        return r.json();
      })
      .then(d => { if (d.text) setBriefing({ text: d.text, actions: d.actions || [] }); })
      .catch(() => {});
  }, [isAuth]);

  const submitAuth = async () => {
    const userId = authUserId.trim();
    const password = authPassword;
    if (!userId || !password) {
      setAuthError('Enter both a user ID and password.');
      return;
    }

    setAuthBusy(true);
    setAuthError('');
    try {
      const r = await fetch(authMode === 'register' ? '/auth/register' : '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, password })
      });
      const d = await r.json();
      if (!r.ok || !d.token) {
        setAuthError(d.error || 'Authentication failed.');
      } else {
        persistSession(d.token, d.userId || userId);
        setAuthPassword('');
        setIsAuth(true);
      }
    } catch {
      setAuthError('Network error. Try again.');
    } finally {
      setAuthBusy(false);
    }
  };

  if (!isAuth) return (
    <div className="auth-overlay">
      <div className="auth-card">
        <h2>Welcome to Oxy</h2>
        <p>{authMode === 'register' ? 'Create your personal Oxy account' : 'Sign in to your Oxy account'}</p>
        <input type="text" className="auth-input" placeholder="User ID" value={authUserId} onChange={e => setAuthUserId(e.target.value)} />
        <input type="password" className="auth-input" placeholder={authMode === 'register' ? 'Password (8+ characters)' : 'Password'} value={authPassword} onChange={e => setAuthPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && !authBusy && submitAuth()} />
        {authError && <div style={{color:'var(--red)',fontSize:'12px',marginBottom:'10px'}}>{authError}</div>}
        <button className="auth-btn" onClick={submitAuth} disabled={authBusy}>
          {authBusy ? 'Please wait…' : authMode === 'register' ? 'Create Account' : 'Sign In'}
        </button>
        <button
          onClick={() => { setAuthMode(authMode === 'register' ? 'login' : 'register'); setAuthError(''); }}
          style={{marginTop:'14px',background:'none',border:'none',color:'var(--sub)',fontSize:'12px',cursor:'pointer',fontFamily:'var(--font)'}}
        >
          {authMode === 'register' ? 'Already have an account? Sign in' : 'Need an account? Register'}
        </button>
      </div>
    </div>
  );

  const navItems = [
    { id: 'chat',       label: 'Chat',       icon: Icons.chat },
    { id: 'history',    label: 'History',    icon: Icons.history },
    { id: 'connectors', label: 'Connectors', icon: Icons.connectors },
    { id: 'memory',     label: 'Memory',     icon: Icons.memory },
    { id: 'settings',   label: 'Settings',   icon: Icons.settings },
  ];

  const titles = { chat: 'Oxy', history: 'History', connectors: 'Connectors', memory: 'Memory', settings: 'Settings' };

  return (
    <div className="app">
      {/* Desktop sidebar */}
      <div className="sidebar">
        <div className="logo">
          <div className="logo-name">{settings.name}</div>
          <div className="logo-sub">
            <span className="status-dot" style={isRecording ? {background:'var(--red)',boxShadow:'0 0 6px rgba(192,80,62,0.5)'} : {}} />
            {isRecording ? 'Listening…' : isProcessing ? 'Processing…' : 'Online'}
          </div>
        </div>
        <nav className="nav">
          {navItems.map(n => (
            <button key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="status" style={{fontSize:'10px',fontWeight:500,letterSpacing:'1px',textTransform:'uppercase',color:'var(--dim)'}}>
            Wearable AI
          </div>
          <button
            className="stop-btn"
            style={{marginLeft:0, marginTop:'10px'}}
            onClick={() => {
              clearSession();
              setBriefing(null);
              setMemory('');
              setPeople([]);
              setIsAuth(false);
            }}
          >
            Sign out
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          {page === 'chat' && <button className="new-chat-btn" onClick={handleNewChat}>+ New Chat</button>}
        </div>

        {page === 'chat' && (
          <>
            <ChatPage key={chatKey} settings={settings} memory={memory} people={people} initialQuery={initialQuery} onRecordingChange={setIsRecording} onProcessingChange={setIsProcessing} />
            {briefing?.actions?.length > 0 && <AutoRunActions actions={briefing.actions} />}
          </>
        )}
        {page === 'history'    && <ActionHistoryPage />}
        {page === 'connectors' && <ConnectorsPage />}
        {page === 'memory'     && <MemoryPage memory={memory} setMemory={setMemory} people={people} setPeople={setPeople} />}
        {page === 'settings'   && <SettingsPage settings={settings} setSettings={setSettings} />}
      </div>

      {/* Mobile nav */}
      <div className="mobile-nav">
        {navItems.map(n => (
          <button key={n.id} className={`mob-nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
            <span className="mob-nav-icon">{n.icon}</span>
            {n.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
